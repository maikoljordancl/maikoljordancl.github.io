<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maikol Jordan</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f0f0f;
color:white;
}

header{
background:#000;
padding:25px;
text-align:center;
border-bottom:3px solid #e60012;
}

.logo{
width:140px;
height:140px;
object-fit:cover;
border-radius:50%;
border:3px solid #e60012;
}

h1{
margin-top:15px;
font-size:32px;
color:#fff;
}

.sub{
color:#e60012;
margin-top:10px;
font-weight:bold;
}

.envio{
margin-top:10px;
font-size:18px;
}

.search{
padding:20px;
}

.search input{
width:100%;
padding:14px;
border:none;
border-radius:10px;
font-size:16px;
}

.categorias{
display:flex;
gap:10px;
overflow-x:auto;
padding:10px 20px 20px;
}

.categorias button{
background:#1f1f1f;
color:white;
border:none;
padding:10px 15px;
border-radius:20px;
cursor:pointer;
white-space:nowrap;
}

.categorias button:hover{
background:#e60012;
}

.produtos{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#1b1b1b;
border-radius:15px;
padding:15px;
border:1px solid #333;
}

.card h3{
margin-bottom:10px;
}

.precio{
font-size:22px;
color:#e60012;
font-weight:bold;
margin-bottom:15px;
}

select{
width:100%;
padding:10px;
border:none;
border-radius:8px;
margin-bottom:10px;
}

.btn{
width:100%;
background:#e60012;
color:white;
border:none;
padding:12px;
border-radius:8px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px 20px;
border-radius:50px;
text-decoration:none;
font-weight:bold;
box-shadow:0 0 10px rgba(0,0,0,.5);
}

footer{
padding:30px;
text-align:center;
margin-top:20px;
background:#000;
}

</style>
</head>

<body>

<header>
<img src="logo.webp" class="logo">
<h1>MAIKOL JORDAN</h1>
<div class="sub">Jordan • Nike • Lujo</div>
<div class="envio">🚚 Envíos a todo Chile $5.000</div>
</header>

<div class="search">
<input type="text" id="buscar" placeholder="Buscar modelo...">
</div>

<div class="categorias">
<button onclick="filtrar('todos')">Todos</button>
<button onclick="filtrar('Jordan')">Jordan</button>
<button onclick="filtrar('Nike')">Nike</button>
<button onclick="filtrar('New Balance')">New Balance</button>
<button onclick="filtrar('Balenciaga')">Balenciaga</button>
<button onclick="filtrar('Dior')">Dior</button>
<button onclick="filtrar('Louis Vuitton')">Louis Vuitton</button>
<button onclick="filtrar('Dolce & Gabbana')">Dolce & Gabbana</button>
</div>

<div class="produtos" id="productos">
