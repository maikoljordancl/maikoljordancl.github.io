<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maikol Jordan | Pro Store</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}

body{
background:#0b0b0b;
color:white;
}

/* HEADER */
header{
background:#000;
padding:30px;
text-align:center;
border-bottom:3px solid #e60012;
}
.logo{
width:130px;height:130px;border-radius:50%;
border:3px solid #e60012;object-fit:cover;
}
h1{margin-top:10px;font-size:34px;}
.sub{color:#e60012;font-weight:bold;}
.envio{opacity:0.8;margin-top:5px;}

/* SEARCH */
.search{padding:20px;}
.search input{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#1c1c1c;
color:white;
}

/* FILTER */
.categorias{
display:flex;gap:10px;overflow-x:auto;
padding:10px 20px;
}
.categorias button{
background:#1a1a1a;
color:white;
border:none;
padding:10px 16px;
border-radius:20px;
cursor:pointer;
}
.categorias button.active,
.categorias button:hover{
background:#e60012;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:20px;
padding:20px;
}

/* CARD */
.card{
background:#151515;
border:1px solid #2a2a2a;
border-radius:16px;
padding:15px;
display:flex;
flex-direction:column;
gap:10px;
transition:0.2s;
}
.card:hover{transform:translateY(-5px);}
.card h3{font-size:18px;}
.price{color:#e60012;font-weight:bold;font-size:20px;}

select{
padding:10px;
border-radius:8px;
border:none;
background:#222;
color:white;
}

/* BUTTON */
.btn{
background:#e60012;
color:white;
border:none;
padding:12px;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}
.btn:hover{background:#b8000e;}

/* CART */
.cart-btn{
position:fixed;
bottom:20px;
right:20px;
background:#e60012;
border:none;
padding:14px 18px;
border-radius:50px;
color:white;
font-weight:bold;
cursor:pointer;
}

</style>
</head>

<body>

<header>
<img src="logo.webp" class="logo">
<h1>MAIKOL JORDAN</h1>
<div class="sub">Jordan • Nike • Luxury</div>
<div class="envio">🚚 Envíos a todo Chile $5.000</div>
</header>

<div class="search">
<input type="text" id="search" placeholder="Buscar modelo...">
</div>

<div class="categorias" id="cats"></div>

<div class="grid" id="grid"></div>

<button class="cart-btn" onclick="alert('Carrito en versión base')">
🛒 Carrito
</button>

<script>
const shipping = 5000;

const products = [

/* NIKE */
{cat:"Nike",name:"Nike TN",price:75000},
{cat:"Nike",name:"Nike Shox",price:70000},
{cat:"Nike",name:"Air Force 1",price:70000},
{cat:"Nike",name:"Air Force 1 Mid",price:75000},
{cat:"Nike",name:"AF1 Supreme Nocta",price:85000},
{cat:"Nike",name:"AF1 CPFM",price:70000},

/* JORDAN */
{cat:"Jordan",name:"Jordan 1",price:70000},
{cat:"Jordan",name:"Jordan 3",price:75000},
{cat:"Jordan",name:"Jordan 4",price:75000},
{cat:"Jordan",name:"Jordan 5",price:75000},
{cat:"Jordan",name:"Jordan 6",price:75000},
{cat:"Jordan",name:"Jordan 8",price:75000},
{cat:"Jordan",name:"Jordan 11",price:80000},
{cat:"Jordan",name:"Jordan 12",price:75000},
{cat:"Jordan",name:"Jordan 13",price:75000},
{cat:"Jordan",name:"Jordan 14",price:80000},
{cat:"Jordan",name:"Jordan 312",price:90000},

/* AIR MAX */
{cat:"Nike",name:"Air Max 95",price:80000},
{cat:"Nike",name:"Air Max 97",price:80000},

/* LUJO */
{cat:"Balenciaga",name:"Balenciaga Runner",price:140000},
{cat:"Balenciaga",name:"Balenciaga Track LED",price:140000},

{cat:"Dior",name:"Dior B22-B30",price:80000},

{cat:"Louis Vuitton",name:"LV Trainer",price:115000},
{cat:"Louis Vuitton",name:"LV Skate",price:120000},

{cat:"Dolce & Gabbana",name:"Portofino",price:100000},

{cat:"Giuseppe Zanotti",name:"Giuseppe Zanotti Sneakers",price:140000}
];

let filter="all";

function render(){
let grid=document.getElementById("grid");
let search=document.getElementById("search").value.toLowerCase();

grid.innerHTML="";

products.forEach((p,i)=>{

if(filter!="all" && p.cat!=filter) return;
if(!p.name.toLowerCase().includes(search)) return;

grid.innerHTML+=`
<div class="card">
<h3>${p.name}</h3>
<div class="price">$${p.price.toLocaleString("es-CL")}</div>

<select id="t${i}">
${Array.from({length:11},(_,x)=>36+x).map(t=>`<option>${t}</option>`).join("")}
</select>

<button class="btn" onclick="buy(${i})">
Pedir por WhatsApp
</button>
</div>`;
});

renderCats();
}

function renderCats(){
let cats=[...new Set(products.map(p=>p.cat))];
let c=document.getElementById("cats");

c.innerHTML=`<button onclick="setFilter('all')">Todos</button>`;

cats.forEach(cat=>{
c.innerHTML+=`<button onclick="setFilter('${cat}')">${cat}</button>`;
});
}

function setFilter(c){
filter=c;
render();
}

function buy(i){
let p=products[i];
let t=document.getElementById("t"+i).value;

let msg=`Hola, quiero comprar:
Modelo: ${p.name}
Talla: ${t}
Precio: $${p.price}
Envío: $${shipping}
Total: $${p.price+shipping}`;

window.open("https://wa.me/56931402987?text="+encodeURIComponent(msg));
}

document.getElementById("search").addEventListener("input",render);

render();
</script>

</body>
</html>
