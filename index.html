<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maikol Jordan</title>
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}
body{
  background:#0b0b0b;
  color:white;
}
header{
  background:#000;
  padding:30px;
  text-align:center;
  border-bottom:3px solid #e60012;
}
.logo{
  width:130px;
  height:130px;
  object-fit:cover;
  border-radius:50%;
  border:3px solid #e60012;
}
h1{
  margin-top:10px;
  font-size:34px;
}
.sub{
  color:#e60012;
  font-weight:bold;
}
.envio{
  margin-top:8px;
  opacity:0.8;
}
.search{
  padding:20px;
}
.search input{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#1c1c1c;
  color:white;
  font-size:16px;
  outline:none;
}
.categorias{
  display:flex;
  gap:10px;
  overflow-x:auto;
  padding:10px 20px;
}
.categorias::-webkit-scrollbar{
  display:none;
}
.categorias button{
  background:#1a1a1a;
  color:white;
  border:none;
  padding:10px 16px;
  border-radius:20px;
  cursor:pointer;
  transition:0.3s;
  white-space:nowrap;
}
.categorias button:hover,
.categorias button.active{
  background:#e60012;
}
.produtos{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:20px;
  padding:20px;
}
.card{
  background:#151515;
  border-radius:18px;
  padding:15px;
  border:1px solid #2a2a2a;
  transition:0.3s;
  display:flex;
  flex-direction:column;
  gap:10px;
  justify-content:space-between;
}
.card:hover{
  transform:translateY(-5px);
  box-shadow:0 10px 20px rgba(0,0,0,0.5);
}
.img-producto{
  display:block;
  width:100%;
  height:200px;
  object-fit:cover;
  border-radius:12px;
  background:#222;
}
.card h3{
  font-size:18px;
  margin-top:5px;
}
.precio{
  color:#e60012;
  font-size:22px;
  font-weight:bold;
}
select{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#222;
  color:white;
  font-weight:bold;
  outline:none;
  cursor:pointer;
}
.btn{
  background:#e60012;
  border:none;
  padding:12px;
  border-radius:10px;
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}
.btn:hover{
  background:#b8000e;
}

/* BOTÓN CARRITO FLOTANTE */
.cart-btn{
  position:fixed;
  bottom:20px;
  left:20px;
  background:#e60012;
  color:white;
  padding:14px 18px;
  border-radius:50px;
  font-weight:bold;
  z-index:999;
  box-shadow:0 4px 10px rgba(0,0,0,0.4);
  cursor:pointer;
  border:none;
  font-size:16px;
}
.cart-badge{
  background:white;
  color:#e60012;
  border-radius:50%;
  padding:2px 7px;
  font-size:13px;
  margin-left:5px;
  font-weight:bold;
}

/* OVERLAY */
.cart-overlay{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.6);
  z-index:1000;
}
.cart-overlay.open{
  display:block;
}

/* PANEL CARRITO */
.cart-panel{
  position:fixed;
  top:0;right:-100%;
  width:380px;
  max-width:100%;
  height:100%;
  background:#111;
  z-index:1001;
  display:flex;
  flex-direction:column;
  transition:right 0.3s;
  padding:20px;
}
.cart-panel.open{
  right:0;
}
.cart-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
  border-bottom:2px solid #e60012;
  padding-bottom:15px;
}
.cart-header h2{
  font-size:22px;
}
.cart-close{
  background:none;
  border:none;
  color:white;
  font-size:26px;
  cursor:pointer;
}
.cart-items{
  flex:1;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:12px;
}
.cart-item{
  background:#1a1a1a;
  border-radius:12px;
  padding:12px;
  display:flex;
  gap:10px;
  align-items:center;
}
.cart-item img{
  width:70px;
  height:70px;
  object-fit:cover;
  border-radius:8px;
  background:#222;
  flex-shrink:0;
}
.cart-item-info{
  flex:1;
}
.cart-item-name{
  font-weight:bold;
  font-size:14px;
  margin-bottom:3px;
}
.cart-item-talla{
  color:#999;
  font-size:13px;
  margin-bottom:4px;
}
.cart-item-precio{
  color:#e60012;
  font-weight:bold;
  font-size:15px;
}
.cart-item-remove{
  background:none;
  border:none;
  color:#666;
  font-size:22px;
  cursor:pointer;
  padding:0 4px;
}
.cart-item-remove:hover{
  color:#e60012;
}
.cart-empty{
  text-align:center;
  color:#555;
  margin-top:60px;
  font-size:16px;
}
.cart-footer{
  border-top:2px solid #222;
  padding-top:15px;
  margin-top:15px;
}
.cart-total-row{
  display:flex;
  justify-content:space-between;
  margin-bottom:8px;
  color:#aaa;
  font-size:15px;
}
.cart-total-final{
  display:flex;
  justify-content:space-between;
  font-size:20px;
  font-weight:bold;
  color:white;
  margin-bottom:15px;
}
.cart-wsp-btn{
  width:100%;
  background:#25D366;
  color:white;
  border:none;
  padding:15px;
  border-radius:12px;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}
.cart-wsp-btn:hover{
  background:#1ebe5d;
}

/* WHATSAPP */
.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:white;
  padding:14px 18px;
  border-radius:50px;
  text-decoration:none;
  font-weight:bold;
  z-index:999;
  box-shadow:0 4px 10px rgba(0,0,0,0.4);
}

/* TOAST */
.toast{
  position:fixed;
  bottom:90px;
  left:20px;
  background:#e60012;
  color:white;
  padding:10px 18px;
  border-radius:10px;
  font-weight:bold;
  z-index:9999;
  opacity:0;
  transition:opacity 0.3s;
  pointer-events:none;
}
.toast.show{
  opacity:1;
}

.loading {
  text-align: center;
  grid-column: 1 / -1;
  padding: 40px;
  font-size: 18px;
  color: #aaa;
}

footer{
  text-align:center;
  padding:30px;
  margin-top:20px;
  background:#000;
  opacity:0.8;
}
</style>
</head>
<body>

<header>
  <img src="logo.webp" class="logo" alt="Maikol Jordan Logo">
  <h1>MAIKOL JORDAN</h1>
  <div class="sub">Jordan • Nike • Luxury</div>
  <div class="envio">🚚 Envíos a todo Chile $5.000</div>
</header>

<div class="search">
  <input type="text" id="buscar" placeholder="Buscar modelo...">
</div>

<div class="categorias" id="categorias-container">
  <button onclick="filtrar('todos', this)" class="active">Todos</button>
  </div>

<div class="produtos" id="productos">
  <div class="loading">Cargando catálogo...</div>
</div>

<button class="cart-btn" onclick="abrirCarrito()">
  🛒 Carrito <span class="cart-badge" id="cart-count">0</span>
</button>

<div class="cart-overlay" id="cart-overlay" onclick="cerrarCarrito()"></div>

<div class="cart-panel" id="cart-panel">
  <div class="cart-header">
    <h2>🛒 Tu carrito</h2>
    <button class="cart-close" onclick="cerrarCarrito()">✕</button>
  </div>
  <div class="cart-items" id="cart-items"></div>
  <div class="cart-footer" id="cart-footer" style="display:none">
    <div class="cart-total-row"><span>Subtotal</span><span id="cart-subtotal"></span></div>
    <div class="cart-total-row"><span>Envío</span><span>$5.000</span></div>
    <div class="cart-total-final"><span>TOTAL</span><span id="cart-total"></span></div>
    <button class="cart-wsp-btn" onclick="pedirCarrito()">💬 Pedir por WhatsApp</button>
  </div>
</div>

<div class="toast" id="toast">✅ Agregado al carrito</div>

<a class="whatsapp" href="https://wa.me/56931402987?text=Hola,%20tengo%20una%20consulta" target="_blank">
  💬 Consultas
</a>

<footer>
  © 2026 MAIKOL JORDAN
</footer>

<script>
const SHEETS_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSFZr9QkH84F5sgayYzorXHXFesug2rCZ6AAPS6GVRXdLxmYHN7XYUX6JfArFsMUHREqPqL3jJ8r7ks/pub?output=csv";

let productos = [];
let categoriaActual = "todos";
let carrito = [];

async function cargarProductos() {
  try {
    const respuesta = await fetch(SHEETS_CSV_URL);
    const textoCSV = await respuesta.text();
    
    const lineas = textoCSV.split("\n").map(l => l.trim()).filter(l => l.length > 0);
    const encabezados = lineas[0].split(",").map(h => h.trim().toLowerCase());
    
    productos = lineas.slice(1).map(linea => {
      const columnas = linea.split(",");
      return {
        nombre: columnas[0]?.replace(/"/g, "") || "Modelo sin nombre",
        precio: parseInt(columnas[1]) || 0,
        imagen: columnas[2]?.trim() || "logo.webp",
        tags: [columnas[3]?.trim() || "Otros"],
        tallas: columnas[4] ? columnas[4].split(";").map(t => parseInt(t.trim())).filter(t => !isNaN(t)) : [37,38,39,40,41,42,43,44,45]
      };
    });
    
    generarBotonesCategorias();
    render();
  } catch (error) {
    console.error("Error cargando Google Sheets:", error);
    document.getElementById("productos").innerHTML = `<div class="loading">❌ Error al cargar el catálogo.</div>`;
  }
}

function generarBotonesCategorias() {
    const container = document.getElementById("categorias-container");
    const categoriasUnicas = ["todos", ...new Set(productos.map(p => p.tags[0]).filter(Boolean))];
    
    container.innerHTML = "";
    categoriasUnicas.forEach(cat => {
        const btn = document.createElement("button");
        btn.className = cat === "todos" ? "active" : "";
        btn.textContent = cat === "todos" ? "Todos" : cat;
        btn.onclick = (e) => filtrar(cat, e.target);
        container.appendChild(btn);
    });
}

function render(){
  const cont = document.getElementById("productos");
  if(productos.length === 0) {
    cont.innerHTML = `<div class="loading">No hay productos disponibles.</div>`;
    return;
  }
  
  cont.innerHTML = productos.map((p, index) => `
    <div class="card" data-index="${index}">
      <img src="${p.imagen}" class="img-producto" alt="${p.nombre}">
      <h3>${p.nombre}</h3>
      <div class="precio">$${p.precio.toLocaleString("es-CL")}</div>
      <select id="talla-${index}">
        ${p.tallas.map(t => `<option value="${t}" ${t === 41 ? 'selected' : ''}>Talla: ${t}</option>`).join("")}
      </select>
      <button class="btn" onclick="agregarAlCarrito(${index})">
        🛒 Agregar al carrito
      </button>
    </div>
  `).join("");
  aplicar(); // Aplicar filtro actual si lo hay
}

cargarProductos();

function filtrar(cat, btnElemento){
  categoriaActual = cat;
  document.querySelectorAll(".categorias button").forEach(b => b.classList.remove("active"));
  btnElemento.classList.add("active");
  aplicar();
}

document.getElementById("buscar").addEventListener("keyup", aplicar);

function aplicar(){
  const texto = document.getElementById("buscar").value.toLowerCase();
  document.querySelectorAll(".card").forEach(card => {
    const index = parseInt(card.dataset.index);
    const p = productos[index];
    if(!p) return;
    const enCategoria = categoriaActual === "todos" || p.tags.includes(categoriaActual);
    const enBusqueda = p.nombre.toLowerCase().includes(texto);
    card.style.display = (enCategoria && enBusqueda) ? "flex" : "none";
  });
}

function agregarAlCarrito(index){
  const p = productos[index];
  const talla = document.getElementById(`talla-${index}`).value;
  carrito.push({ nombre: p.nombre, precio: p.precio, imagen: p.imagen, talla });
  actualizarCarrito();
  mostrarToast();
}

function actualizarCarrito(){
  const count = carrito.length;
  document.getElementById("cart-count").textContent = count;

  const itemsEl = document.getElementById("cart-items");
  const footerEl = document.getElementById("cart-footer");

  if(count === 0){
    itemsEl.innerHTML = `<div class="cart-empty">😕 Tu carrito está vacío</div>`;
    footerEl.style.display = "none";
    return;
  }

  itemsEl.innerHTML = carrito.map((item, i) => `
    <div class="cart-item">
      <img src="${item.imagen}" alt="${item.nombre}">
      <div class="cart-item-info">
        <div class="cart-item-name">${item.nombre}</div>
        <div class="cart-item-talla">Talla: ${item.talla}</div>
        <div class="cart-item-precio">$${item.precio.toLocaleString("es-CL")}</div>
      </div>
      <button class="cart-item-remove" onclick="eliminarItem(${i})">✕</button>
    </div>
  `).join("");

  const subtotal = carrito.reduce((sum, item) => sum + item.precio, 0);
  const total = subtotal + 5000;

  document.getElementById("cart-subtotal").textContent = `$${subtotal.toLocaleString("es-CL")}`;
  document.getElementById("cart-total").textContent = `$${total.toLocaleString("es-CL")}`;
  footerEl.style.display = "block";
}

function eliminarItem(i){
  carrito.splice(i, 1);
  actualizarCarrito();
}

function abrirCarrito(){
  document.getElementById("cart-panel").classList.add("open");
  document.getElementById("cart-overlay").classList.add("open");
  actualizarCarrito();
}

function cerrarCarrito(){
  document.getElementById("cart-panel").classList.remove("open");
  document.getElementById("cart-overlay").classList.remove("open");
}

function mostrarToast(){
  const toast = document.getElementById("toast");
  toast.classList.add("show");
  setTimeout(() => toast.classList.remove("show"), 2000);
}

function pedirCarrito(){
  if(carrito.length === 0) return;
  const subtotal = carrito.reduce((sum, item) => sum + item.precio, 0);
  const total = subtotal + 5000;

  const lineas = carrito.map((item, i) =>
    `${i+1}. ${item.nombre} | Talla: ${item.talla} | $${item.precio.toLocaleString("es-CL")}`
  ).join("\n");

  const msg =
`Hola, quiero hacer el siguiente pedido:

${lineas}

💰 Subtotal: $${subtotal.toLocaleString("es-CL")}
🚚 Envío: $5.000
TOTAL: $${total.toLocaleString("es-CL")}`;

  window.open("https://wa.me/56931402987?text=" + encodeURIComponent(msg), "_blank");
}
</script>

</body>
</html>
