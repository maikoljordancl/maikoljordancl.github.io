<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maikol Jordan</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0b0b0b;
color:white;
}

/* HEADER */
header{
background:#000;
padding:30px;
text-align:center;
border-bottom:3px solid #e60012;
}

.logo{
width:130px;
height:130px;
object-fit:cover;
border-radius:50%;
border:3px solid #e60012;
}

h1{
margin-top:10px;
font-size:34px;
}

.sub{
color:#e60012;
font-weight:bold;
margin-top:5px;
}

.envio{
margin-top:8px;
opacity:0.8;
}

/* SEARCH */
.search{
padding:20px;
}

.search input{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#1c1c1c;
color:white;
font-size:16px;
outline:none;
}

/* CATEGORIAS */
.categorias{
display:flex;
gap:10px;
overflow-x:auto;
padding:10px 20px;
}

.categorias button{
background:#1a1a1a;
color:white;
border:none;
padding:10px 16px;
border-radius:20px;
cursor:pointer;
transition:0.3s;
white-space:nowrap;
}

.categorias button:hover,
.categorias button.active{
background:#e60012;
}

/* GRID */
.produtos{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:20px;
padding:20px;
}

/* CARD PRO */
.card{
background:#151515;
border-radius:18px;
padding:15px;
border:1px solid #2a2a2a;
transition:0.3s;
display:flex;
flex-direction:column;
gap:10px;
justify-content: space-between;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 10px 20px rgba(0,0,0,0.5);
}

.card h3{
font-size:18px;
}

.precio{
color:#e60012;
font-size:22px;
font-weight:bold;
}

/* NUEVO: Estilo para el selector de tallas integrado con el diseño */
select{
width:100%;
padding:10px;
border:none;
border-radius:8px;
background:#252525;
color:white;
font-weight:bold;
outline:none;
}

/* BTN */
.btn{
background:#e60012;
border:none;
padding:12px;
border-radius:10px;
color:white;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.btn:hover{
background:#b8000e;
}

/* WHATSAPP */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:14px 18px;
border-radius:50px;
text-decoration:none;
font-weight:bold;
z-index: 1000;
}

/* FOOTER */
footer{
text-align:center;
padding:30px;
margin-top:20px;
background:#000;
opacity:0.8;
}

</style>
</head>

<body>

<header>
<img src="logo.webp" class="logo">
<h1>MAIKOL JORDAN</h1>
<div class="sub">Jordan • Nike • Luxury</div>
<div class="envio">🚚 Envíos a todo Chile $5.000</div>
</header>

<div class="search">
<input type="text" id="buscar" placeholder="Buscar modelo...">
</div>

<div class="categorias">
<button onclick="filtrar('todos', this)" class="active">Todos</button>
<button onclick="filtrar('Jordan', this)">Jordan</button>
<button onclick="filtrar('Nike', this)">Nike</button>
<button onclick="filtrar('Balenciaga', this)">Balenciaga</button>
<button onclick="filtrar('Dior', this)">Dior</button>
<button onclick="filtrar('Louis Vuitton', this)">Louis Vuitton</button>
</div>

<div class="produtos" id="productos"></div>

<a class="whatsapp" href="https://wa.me/56931402987?text=Hola!%20Tengo%20una%20consulta" target="_blank">
💬 Consultas
</a>

<footer>
© 2026 MAIKOL JORDAN
</footer>

<script>

const productos = [
  {cat:"Nike", nombre:"Nike TN", precio:75000},
  {cat:"Nike", nombre:"Nike Shox", precio:70000},
  {cat:"Nike", nombre:"AF1", precio:70000},
  {cat:"Jordan", nombre:"Jordan 1", precio:70000},
  {cat:"Jordan", nombre:"Jordan 4", precio:75000},
  {cat:"Jordan", nombre:"Jordan 11", precio:80000},
  {cat:"Balenciaga", nombre:"Balenciaga Runner", precio:140000},
  {cat:"Dior", nombre:"Dior B22", precio:80000},
  {cat:"Louis Vuitton", nombre:"LV Skate", precio:120000}
];

let categoriaActual = "todos";

function render(){
  let cont = document.getElementById("productos");

  // Usamos el index para identificar de forma exacta el select de cada zapatilla
  cont.innerHTML = productos.map((p, index) => `
    <div class="card" data-cat="${p.cat}">
      <h3>${p.nombre}</h3>
      <div class="precio">$${p.precio.toLocaleString("es-CL")}</div>
      
      <select id="talla-${index}">
        ${Array.from({length:11},(_,i)=>36+i)
          .map(t=>`<option value="${t}" ${t === 41 ? 'selected' : ''}>Talla: ${t}</option>`).join("")}
      </select>

      <button class="btn" onclick="pedir(${index})">
        Comprar
      </button>
    </div>
  `).join("");
}

render();

// CORRECCIÓN: Añadido 'botonElemento' para reemplazar de forma segura el problemático 'event.target'
function filtrar(cat, botonElemento){
  categoriaActual = cat;

  document.querySelectorAll(".categorias button")
  .forEach(b => b.classList.remove("active"));

  botonElemento.classList.add("active");

  aplicar();
}

document.getElementById("buscar").addEventListener("keyup", aplicar);

function aplicar(){
  let texto = document.getElementById("buscar").value.toLowerCase();

  document.querySelectorAll(".card").forEach(card => {

    let nombre = card.querySelector("h3").innerText.toLowerCase();
    let cat = card.dataset.cat;

    let ok = (categoriaActual === "todos" || cat === categoriaActual)
             && nombre.includes(texto);

    card.style.display = ok ? "flex" : "none";
  });
}

// CORRECCIÓN: Ahora lee dinámicamente el producto e inyecta la talla seleccionada
function pedir(index){
  let producto = productos[index];
  let selectTalla = document.getElementById(`talla-${index}`);
  let talla = selectTalla.value;

  let total = producto.precio + 5000;

  let precioFormateado = producto.precio.toLocaleString('es-CL');
  let totalFormateado = total.toLocaleString('es-CL');

  let msg =
`Hola, quiero comprar:

👟 Modelo: ${producto.nombre}
📏 Talla: ${talla}

💰 Precio: $${precioFormateado}
🚚 Envío: $5.000
TOTAL: $${totalFormateado}`;

  window.open(
    "https://wa.me/56931402987?text=" + encodeURIComponent(msg),
    "_blank"
  );
}

</script>

</body>
</html>
