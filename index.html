<script>
// ========== 1. PERSISTENCIA DEL CARRITO ==========
function guardarCarrito() {
  localStorage.setItem('carrito', JSON.stringify(carrito));
}

function cargarCarrito() {
  const data = localStorage.getItem('carrito');
  if (data) {
    try {
      carrito = JSON.parse(data);
      actualizarCarrito();
    } catch(e) {}
  }
}

// Sobrescribimos las funciones que modifican el carrito para que guarden
const originalAgregar = agregarAlCarrito;
agregarAlCarrito = function(index) {
  const p = productos[index];
  const talla = document.getElementById("talla-" + index).value;
  carrito.push({ nombre: p.nombre, precio: p.precio, imagen: p.imagenes[0], talla: talla });
  actualizarCarrito();
  guardarCarrito();
  mostrarToast(p.nombre, p.imagenes[0]);
};

const originalRemover = removerDelCarrito;
removerDelCarrito = function(i) {
  carrito.splice(i, 1);
  actualizarCarrito();
  guardarCarrito();
};

// También en comprarAhoraDesdeCard, agregarDesdeGaleria, comprarAhora
// (puedes sobrescribirlas o añadir guardarCarrito() al final de cada una)

// ========== 2. TOAST CON IMAGEN ==========
function mostrarToast(nombre, imagen) {
  const t = document.getElementById("toast");
  t.innerHTML = '<div class="toast-con-imagen"><img src="' + imagen + '" onerror="this.src=\'logo.webp\'"> <span>✅ ' + nombre + '</span></div>';
  t.classList.add("show");
  clearTimeout(t._timeout);
  t._timeout = setTimeout(function() { t.classList.remove("show"); }, 2500);
}

// ========== 3. VALIDACIÓN DEL FORMULARIO ==========
function validarCampo(id, regex, mensaje) {
  const el = document.getElementById(id);
  const val = el.value.trim();
  if (!regex.test(val)) {
    el.style.borderColor = "#ff6b6b";
    el.setCustomValidity(mensaje);
    return false;
  } else {
    el.style.borderColor = "#3ddc84";
    el.setCustomValidity("");
    return true;
  }
}

// Validar WhatsApp chileno: +569XXXXXXXX o 9XXXXXXXX
function validarWhatsapp(val) {
  const limpio = val.replace(/\s/g, '');
  return /^(\+569|9)\d{8}$/.test(limpio);
}

// Asignar eventos a los campos
document.addEventListener("DOMContentLoaded", function() {
  const nombre = document.getElementById("c-nombre");
  const whatsapp = document.getElementById("c-whatsapp");
  const calle = document.getElementById("dir-calle");
  const numero = document.getElementById("dir-numero");
  const region = document.getElementById("dir-region");
  const comuna = document.getElementById("dir-comuna");

  nombre.addEventListener("input", function() {
    validarCampo("c-nombre", /.{3,}/, "Mínimo 3 caracteres");
  });
  whatsapp.addEventListener("input", function() {
    const val = this.value.trim();
    if (!validarWhatsapp(val)) {
      this.style.borderColor = "#ff6b6b";
      this.setCustomValidity("Formato: +569XXXXXXXX o 9XXXXXXXX");
    } else {
      this.style.borderColor = "#3ddc84";
      this.setCustomValidity("");
    }
  });
  calle.addEventListener("input", function() {
    validarCampo("dir-calle", /.{3,}/, "Ingresa tu calle");
  });
  numero.addEventListener("input", function() {
    validarCampo("dir-numero", /.{1,}/, "Ingresa el número");
  });
  region.addEventListener("input", function() {
    validarCampo("dir-region", /.{3,}/, "Ingresa tu región");
  });
  comuna.addEventListener("input", function() {
    validarCampo("dir-comuna", /.{3,}/, "Ingresa tu comuna");
  });
});

// ========== 4. GUARDAR TODOS LOS DATOS DEL COMPRADOR ==========
function cargarDatosGuardados() {
  const campos = {
    "c-nombre": "m_nombre",
    "c-whatsapp": "m_whatsapp",
    "dir-calle": "m_calle",
    "dir-numero": "m_numero",
    "dir-region": "m_region",
    "dir-comuna": "m_comuna",
    "dir-cp": "m_cp"
  };
  Object.keys(campos).forEach(function(id) {
    const val = localStorage.getItem(campos[id]);
    if (val) document.getElementById(id).value = val;
  });
}

function guardarDatosComprador(nombre, whatsapp, direccion, region, comuna, cp) {
  localStorage.setItem("m_nombre", nombre);
  localStorage.setItem("m_whatsapp", whatsapp);
  localStorage.setItem("m_calle", direccion); // guardamos la calle completa
  localStorage.setItem("m_region", region);
  localStorage.setItem("m_comuna", comuna);
  localStorage.setItem("m_cp", cp);
}

// ========== 5. GEOLOCALIZACIÓN MEJORADA ==========
function usarMiUbicacion() {
  const btn = document.getElementById("btn-ubicacion");
  const msg = document.getElementById("ubicacion-msg");

  if (!navigator.geolocation) {
    msg.textContent = "Tu navegador no soporta geolocalización.";
    msg.className = "ubicacion-msg error";
    return;
  }

  btn.disabled = true;
  btn.textContent = "📍 Buscando tu ubicación...";
  msg.textContent = "Obteniendo coordenadas...";
  msg.className = "ubicacion-msg";

  navigator.geolocation.getCurrentPosition(function(pos) {
    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;
    msg.textContent = "Obteniendo dirección desde OpenStreetMap...";
    fetch("https://nominatim.openstreetmap.org/reverse?format=json&lat=" + lat + "&lon=" + lon + "&addressdetails=1")
      .then(function(resp) { return resp.json(); })
      .then(function(data) {
        const a = data.address || {};
        const calle = a.road || a.pedestrian || "";
        const numero = a.house_number || "";
        const comuna = a.city || a.town || a.municipality || a.suburb || a.village || "";
        const region = a.state || a.region || "";
        const cp = a.postcode || "";

        if (calle) document.getElementById("dir-calle").value = calle;
        if (numero) document.getElementById("dir-numero").value = numero;
        if (comuna) document.getElementById("dir-comuna").value = comuna;
        if (region) document.getElementById("dir-region").value = region;
        if (cp) document.getElementById("dir-cp").value = cp;

        msg.textContent = cp ? "✅ Dirección completada automáticamente." : "✅ Dirección completada (código postal no encontrado).";
        msg.className = "ubicacion-msg ok";
        btn.disabled = false;
        btn.textContent = "📍 Usar mi ubicación actual";
      })
      .catch(function(e) {
        msg.textContent = "No pudimos obtener la dirección. Escríbela manualmente.";
        msg.className = "ubicacion-msg error";
        btn.disabled = false;
        btn.textContent = "📍 Usar mi ubicación actual";
      });
  }, function(error) {
    btn.disabled = false;
    btn.textContent = "📍 Usar mi ubicación actual";
    if (error.code === error.PERMISSION_DENIED) {
      msg.textContent = "Permiso denegado. Escribe tu dirección manualmente.";
    } else {
      msg.textContent = "Error al obtener ubicación. Escríbela manualmente.";
    }
    msg.className = "ubicacion-msg error";
  }, { timeout: 10000, enableHighAccuracy: true });
}

// ========== 6. CACHÉ DEL CATÁLOGO ==========
const CACHE_KEY = "productos_cache";
const CACHE_EXPIRY = 60 * 60 * 1000; // 1 hora

function cargarProductosConCache() {
  const cache = localStorage.getItem(CACHE_KEY);
  if (cache) {
    try {
      const data = JSON.parse(cache);
      if (Date.now() - data.timestamp < CACHE_EXPIRY) {
        productos = data.productos;
        generarMenuCategorias();
        render();
        cargarDatosGuardados();
        cargarCarrito();
        abrirProductoPorHash();
        return;
      }
    } catch(e) {}
  }
  // Si no hay caché o expiró, cargar desde Google Sheets
  cargarProductos();
}

// Sobrescribimos cargarProductos para que guarde en caché
const originalCargar = cargarProductos;
cargarProductos = async function() {
  try {
    const respuesta = await fetch(SHEETS_CSV_URL);
    const textoCSV = await respuesta.text();
    if (!textoCSV) throw new Error("Vacío");
    const lineas = textoCSV.split("\n").map(function(l){ return l ? l.trim() : ""; }).filter(function(l){ return l.length > 0; });
    productos = lineas.slice(1).map(function(linea) {
      const columnas = parsearFilaCSV(linea);
      return {
        nombre: columnas[0] ? columnas[0].replace(/"/g, "") : "Modelo sin nombre",
        precio: columnas[1] ? parseInt(columnas[1].replace(/[^0-9]/g, "")) || 0 : 0,
        imagenes: columnas[2] ? columnas[2].split(";").map(function(s){ return s.trim(); }).filter(function(s){ return s.length > 0; }) : ["logo.webp"],
        tags: [columnas[3] ? columnas[3] : "Otros"],
        tallas: columnas[4] ? columnas[4].split(";").map(function(t){ return parseInt(t.trim()); }).filter(function(t){ return !isNaN(t); }) : [37,38,39,40,41,42,43,44,45]
      };
    });
    productos = ordenarFeedInicio(productos);
    // Guardar en caché
    localStorage.setItem(CACHE_KEY, JSON.stringify({
      timestamp: Date.now(),
      productos: productos
    }));
    generarMenuCategorias();
    render();
    cargarDatosGuardados();
    cargarCarrito();
    abrirProductoPorHash();
  } catch (error) {
    document.getElementById("productos").innerHTML = '<div class="loading">❌ Error al conectar con Google Sheets.</div>';
  }
};

// ========== 7. BREADCRUMBS (migas de pan) ==========
// Añadimos un contenedor en el header o en la galería
// y lo actualizamos al abrir un producto

function actualizarBreadcrumbs(producto) {
  const bc = document.getElementById("breadcrumbs");
  if (!bc) return;
  if (!producto) {
    bc.innerHTML = '<a href="#" onclick="filtrar(\'todos\')">Inicio</a>';
    return;
  }
  const categoria = producto.tags[0] || "Producto";
  bc.innerHTML = '<a href="#" onclick="filtrar(\'todos\')">Inicio</a> > <a href="#" onclick="filtrar(\'' + categoria + '\')">' + categoria + '</a> > ' + producto.nombre;
}

// Modificar abrirGaleria para actualizar breadcrumbs
const originalAbrirGaleria = abrirGaleria;
abrirGaleria = function(index) {
  originalAbrirGaleria(index);
  const p = productos[index];
  actualizarBreadcrumbs(p);
};

// Al cerrar, resetear
const originalCerrarGaleria = cerrarGaleria;
cerrarGaleria = function() {
  originalCerrarGaleria();
  actualizarBreadcrumbs(null);
};

// Añadir el contenedor de breadcrumbs en el HTML (justo debajo del filtro-row, por ejemplo)
// Como no puedo modificar el HTML directamente, lo insertamos con JS al cargar.
document.addEventListener("DOMContentLoaded", function() {
  const filtroRow = document.querySelector(".filtro-row");
  if (filtroRow) {
    const bcDiv = document.createElement("div");
    bcDiv.id = "breadcrumbs";
    bcDiv.style.cssText = "padding: 4px 20px 0; font-size: 13px; color: #888; margin-top: -6px;";
    bcDiv.innerHTML = '<a href="#" onclick="filtrar(\'todos\')" style="color:#e60012;text-decoration:none;">Inicio</a>';
    filtroRow.parentNode.insertBefore(bcDiv, filtroRow.nextSibling);
  }
});

// ========== 8. OPEN GRAPH DINÁMICO ==========
// Cuando se abre un producto, actualizar las metaetiquetas
function actualizarOG(producto) {
  let metaTitle = document.querySelector('meta[property="og:title"]');
  let metaDesc = document.querySelector('meta[property="og:description"]');
  let metaImage = document.querySelector('meta[property="og:image"]');
  if (!metaTitle) {
    metaTitle = document.createElement('meta');
    metaTitle.setAttribute('property', 'og:title');
    document.head.appendChild(metaTitle);
  }
  if (!metaDesc) {
    metaDesc = document.createElement('meta');
    metaDesc.setAttribute('property', 'og:description');
    document.head.appendChild(metaDesc);
  }
  if (!metaImage) {
    metaImage = document.createElement('meta');
    metaImage.setAttribute('property', 'og:image');
    document.head.appendChild(metaImage);
  }
  if (producto) {
    metaTitle.setAttribute('content', producto.nombre + ' - Maikol Jordan');
    metaDesc.setAttribute('content', 'Zapatilla ' + producto.nombre + ' | Envío a todo Chile');
    metaImage.setAttribute('content', producto.imagenes[0]);
  } else {
    metaTitle.setAttribute('content', 'Maikol Jordan - Zapatillas de lujo');
    metaDesc.setAttribute('content', 'Catálogo de zapatillas Jordan, Nike, Dior, Louis Vuitton');
    metaImage.setAttribute('content', 'logo.webp');
  }
}

// Modificar abrirGaleria para actualizar OG
abrirGaleria = function(index) {
  originalAbrirGaleria(index);
  const p = productos[index];
  actualizarBreadcrumbs(p);
  actualizarOG(p);
};

// Al cerrar, restaurar OG genérico
cerrarGaleria = function() {
  originalCerrarGaleria();
  actualizarBreadcrumbs(null);
  actualizarOG(null);
};

// ========== 9. BOTÓN COMPARTIR ==========
// Añadimos un botón en la galería (dentro de la info)
// Lo insertamos con JS
document.addEventListener("DOMContentLoaded", function() {
  const infoDiv = document.querySelector(".galeria-info");
  if (infoDiv) {
    const shareBtn = document.createElement("button");
    shareBtn.textContent = "📤 Compartir";
    shareBtn.style.cssText = "background:#1a1a1a;border:1px solid #2a2a2a;color:white;padding:8px 16px;border-radius:20px;cursor:pointer;font-size:13px;margin-bottom:16px;transition:0.3s;";
    shareBtn.onmouseover = function(){ this.style.borderColor = "#e60012"; };
    shareBtn.onmouseout = function(){ this.style.borderColor = "#2a2a2a"; };
    shareBtn.onclick = function() {
      const p = productos[galeriaProductoIndex];
      if (!p) return;
      const url = window.location.origin + window.location.pathname + "#" + slugify(p.nombre);
      if (navigator.share) {
        navigator.share({
          title: p.nombre,
          text: 'Mira esta zapatilla en Maikol Jordan',
          url: url
        }).catch(function(){});
      } else {
        navigator.clipboard.writeText(url).then(function() {
          alert("Enlace copiado al portapapeles: " + url);
        }).catch(function() {
          prompt("Copia este enlace:", url);
        });
      }
    };
    // Insertar justo después del precio
    const precio = document.getElementById("galeria-precio");
    if (precio) {
      precio.parentNode.insertBefore(shareBtn, precio.nextSibling);
    }
  }
});

// ========== 10. POLÍTICA DE PRIVACIDAD (modal) ==========
// Añadimos un enlace en el footer que abra un modal con términos básicos
document.addEventListener("DOMContentLoaded", function() {
  const footer = document.querySelector(".footer-bottom");
  if (footer) {
    const termsLink = document.createElement("a");
    termsLink.href = "#";
    termsLink.textContent = "Política de Privacidad";
    termsLink.style.cssText = "color:#888;font-size:12px;display:inline-block;margin-top:10px;text-decoration:underline;";
    termsLink.onclick = function(e) {
      e.preventDefault();
      alert("TÉRMINOS Y CONDICIONES\n\n" +
            "1. Los precios incluyen IVA.\n" +
            "2. Envíos a todo Chile por $5.000.\n" +
            "3. No se aceptan devoluciones por cambio de talla, solo cambios por defectos de fábrica.\n" +
            "4. Al realizar un pedido, aceptas recibir comunicaciones por WhatsApp.\n" +
            "5. Tus datos serán utilizados únicamente para la gestión de envíos y no serán compartidos con terceros.\n\n" +
            "Para más información, contáctanos por WhatsApp.");
    };
    footer.appendChild(termsLink);
  }
});

window.onload = function() {

};
</script>
