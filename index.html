<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maikol Jordan</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f0f0f;
color:white;
}

header{
background:#000;
padding:25px;
text-align:center;
border-bottom:3px solid #e60012;
}

.logo{
width:140px;
height:140px;
object-fit:cover;
border-radius:50%;
border:3px solid #e60012;
}

h1{
margin-top:15px;
font-size:32px;
color:#fff;
}

.sub{
color:#e60012;
margin-top:10px;
font-weight:bold;
}

.envio{
margin-top:10px;
font-size:18px;
}

.search{
padding:20px;
}

.search input{
width:100%;
padding:14px;
border:none;
border-radius:10px;
font-size:16px;
background: #1b1b1b;
color: white;
}

.categorias{
display:flex;
gap:10px;
overflow-x:auto;
padding:10px 20px 20px;
}

.categorias button{
background:#1f1f1f;
color:white;
border:none;
padding:10px 15px;
border-radius:20px;
cursor:pointer;
white-space:nowrap;
transition: 0.3s;
}

.categorias button:hover, .categorias button.active{
background:#e60012;
}

.produtos{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#1b1b1b;
border-radius:15px;
padding:15px;
border:1px solid #333;
display: flex;
flex-direction: column;
justify-content: space-between;
}

.card h3{
margin-bottom:10px;
}

.precio{
font-size:22px;
color:#e60012;
font-weight:bold;
margin-bottom:15px;
}

select{
width:100%;
padding:10px;
border:none;
border-radius:8px;
margin-bottom:10px;
background: #333;
color: white;
font-weight: bold;
}

.btn{
width:100%;
background:#e60012;
color:white;
border:none;
padding:12px;
border-radius:8px;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition: 0.3s;
}

.btn:hover{
background: #b8000e;
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px 20px;
border-radius:50px;
text-decoration:none;
font-weight:bold;
box-shadow:0 0 10px rgba(0,0,0,.5);
z-index: 1000;
}

footer{
padding:30px;
text-align:center;
margin-top:20px;
background:#000;
}

</style>
</head>

<body>

<header>
<img src="logo.webp" class="logo">
<h1>MAIKOL JORDAN</h1>
<div class="sub">Jordan • Nike • Lujo</div>
<div class="envio">🚚 Envíos a todo Chile $5.000</div>
</header>

<div class="search">
<input type="text" id="buscar" placeholder="Buscar modelo...">
</div>

<div class="categorias">
<button onclick="filtrar('todos')" class="active">Todos</button>
<button onclick="filtrar('Jordan')">Jordan</button>
<button onclick="filtrar('Nike')">Nike</button>
<button onclick="filtrar('Balenciaga')">Balenciaga</button>
<button onclick="filtrar('Dior')">Dior</button>
<button onclick="filtrar('Louis Vuitton')">Louis Vuitton</button>
<button onclick="filtrar('Dolce & Gabbana')">Dolce & Gabbana</button>
</div>

<div class="produtos" id="productos"></div>

<a class="whatsapp" href="https://wa.me/56931402987?text=Hola!%20Tengo%20una%20consulta" target="_blank">
WhatsApp
</a>

<footer>
© 2026 MAIKOL JORDAN<br>
🚚 Envíos a todo Chile $5.000
</footer>

<script>

const productos = [
  // NIKE
  {cat:"Nike", nombre:"Nike TN", precio:75000},
  {cat:"Nike", nombre:"Nike Shox", precio:70000},
  {cat:"Nike", nombre:"AF1", precio:70000},
  {cat:"Nike", nombre:"AF1 Mid", precio:75000},
  {cat:"Nike", nombre:"AF1 Supreme-Nocta", precio:85000},
  {cat:"Nike", nombre:"AF1 CPFM", precio:70000},

  // JORDAN
  {cat:"Jordan", nombre:"Jordan 1", precio:70000},
  {cat:"Jordan", nombre:"Jordan 3", precio:75000},
  {cat:"Jordan", nombre:"Jordan 4", precio:75000},
  {cat:"Jordan", nombre:"Jordan 11", precio:80000},
  {cat:"Jordan", nombre:"Jordan 5", precio:75000},
  {cat:"Jordan", nombre:"Jordan 6", precio:75000},
  {cat:"Jordan", nombre:"Jordan 8", precio:75000},
  {cat:"Jordan", nombre:"Jordan 12", precio:75000},
  {cat:"Jordan", nombre:"Jordan 13", precio:75000},
  {cat:"Jordan", nombre:"Jordan 14", precio:80000},
  {cat:"Jordan", nombre:"Jordan 312", precio:90000},

  // OTROS
  {cat:"Balenciaga", nombre:"Balenciaga Runners", precio:140000},
  {cat:"Balenciaga", nombre:"Balenciaga Track LED", precio:140000},
  {cat:"Dior", nombre:"Dior B22-B30", precio:80000},
  {cat:"Louis Vuitton", nombre:"LV Trainer", precio:115000},
  {cat:"Louis Vuitton", nombre:"LV Skate", precio:120000},
  {cat:"Dolce & Gabbana", nombre:"Portofino", precio:100000}
];

let categoriaActual = "todos";

function render(){
  let cont = document.getElementById("productos");

  // Usamos el índice del arreglo (index) para asociar cada botón con su respectiva lista desplegable de forma exacta
  cont.innerHTML = productos.map((p, index) => `
    <div class="card" data-cat="${p.cat}">
      <h3>${p.nombre}</h3>

      <div class="precio">
        $${p.precio.toLocaleString("es-CL")}
      </div>

      <select id="talla-${index}">
        ${Array.from({length:11},(_,i)=>36+i)
          .map(t=>`<option value="${t}" ${t === 41 ? 'selected' : ''}>Talla: ${t}</option>`).join("")}
      </select>

      <button class="btn" onclick="pedir(${index})">
        Pedir por WhatsApp
      </button>
    </div>
  `).join("");
}

render();

function filtrar(cat){
  categoriaActual = cat;

  document.querySelectorAll('.categorias button').forEach(btn => {
    btn.classList.remove('active');
    if(btn.innerText === cat || (cat === 'todos' && btn.innerText === 'Todos')) {
      btn.classList.add('active');
    }
  });

  aplicarFiltros();
}

document.getElementById("buscar").addEventListener("keyup", aplicarFiltros);

function aplicarFiltros(){
  let texto = document.getElementById("buscar").value.toLowerCase();
  let cards = document.querySelectorAll(".card");

  cards.forEach(card => {
    let nombre = card.querySelector("h3").innerText.toLowerCase();
    let cat = card.dataset.cat;

    let okCat = (categoriaActual === "todos" || cat === categoriaActual);
    let okBus = nombre.includes(texto);

    card.style.display = (okCat && okBus) ? "flex" : "none";
  });
}

// SOLUCIÓN: La función ahora recibe el índice preciso del producto y lee su respectivo select sin fallar ni usar prompt
function pedir(index){
  let producto = productos[index];
  let selectTalla = document.getElementById(`talla-${index}`);
  let talla = selectTalla.value;

  let total = producto.precio + 5000;

  let precioFormateado = producto.precio.toLocaleString('es-CL');
  let totalFormateado = total.toLocaleString('es-CL');

  let mensaje =
`Hola, quiero comprar:

👟 Modelo: ${producto.nombre}
📏 Talla: ${talla}

💵 Precio: $${precioFormateado}
🚚 Envío: $5.000

💰 Total: $${totalFormateado}`;

  window.open(
    `https://wa.me/56931402987?text=${encodeURIComponent(mensaje)}`,
    "_blank"
  );
}

</script>

</body>
</html>
