<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Maikol Jordan</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{background:#0b0b0b;color:white;min-height:100vh;}
header{background:#000;padding:20px;text-align:center;border-bottom:3px solid #e60012;}
header h1{font-size:22px;}
header span{color:#e60012;}

/* LOGIN */
.login-screen{display:flex;align-items:center;justify-content:center;min-height:80vh;padding:20px;}
.login-box{background:#151515;border:1px solid #2a2a2a;border-radius:16px;padding:30px;max-width:340px;width:100%;}
.login-box h2{margin-bottom:20px;text-align:center;}
.password-wrapper{position:relative;margin-bottom:14px;}
.password-wrapper input{width:100%;padding:12px 40px 12px 12px;background:#1c1c1c;border:1px solid #2a2a2a;border-radius:10px;color:white;font-size:15px;outline:none;}
.password-wrapper input:focus{border-color:#e60012;}
.toggle-eye{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:#888;font-size:18px;cursor:pointer;padding:4px;}
.login-box button.btn-entrar{width:100%;padding:12px;background:#e60012;border:none;border-radius:10px;color:white;font-weight:bold;cursor:pointer;}
.login-box button.btn-entrar:hover{background:#b8000e;}
.login-error{color:#ff6b6b;font-size:13px;text-align:center;margin-top:10px;min-height:16px;}

/* PANEL */
.panel{display:none;padding:20px;max-width:900px;margin:0 auto;}
.panel.activo{display:block;}
.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px;}
.btn{background:#e60012;border:none;padding:12px 18px;border-radius:10px;color:white;font-weight:bold;cursor:pointer;transition:0.2s;}
.btn:hover{background:#b8000e;}
.btn-secundario{background:#1a1a1a;border:1px solid #2a2a2a;}
.btn-secundario:hover{border-color:#e60012;}
.filtro-categoria-box{margin-bottom:16px;}
.filtro-categoria-box label{font-size:12px;color:#888;display:block;margin-bottom:4px;}
.filtro-categoria-box select{width:100%;padding:11px;background:#1c1c1c;border:1px solid #2a2a2a;border-radius:8px;color:white;font-size:14px;outline:none;}
.filtro-categoria-box select:focus{border-color:#e60012;}

/* FORM */
.form-box{background:#151515;border:1px solid #2a2a2a;border-radius:16px;padding:20px;margin-bottom:24px;display:none;}
.form-box.activo{display:block;}
.form-box h3{margin-bottom:16px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.form-row.single{grid-template-columns:1fr;}
.form-box input, .form-box select{width:100%;padding:11px;background:#1c1c1c;border:1px solid #2a2a2a;border-radius:8px;color:white;font-size:14px;outline:none;}
.form-box input:focus, .form-box select:focus{border-color:#e60012;}
.form-box label{font-size:12px;color:#888;display:block;margin-bottom:4px;}
.imagenes-zona{border:2px dashed #333;border-radius:10px;padding:16px;text-align:center;margin-bottom:12px;cursor:pointer;transition:0.2s;}
.imagenes-zona:hover{border-color:#e60012;}
.imagenes-preview{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
.img-mini{position:relative;width:70px;height:70px;border-radius:8px;overflow:hidden;background:#222;}
.img-mini img{width:100%;height:100%;object-fit:cover;}
.img-mini button{position:absolute;top:2px;right:2px;background:rgba(0,0,0,0.8);color:#ff6b6b;border:none;width:20px;height:20px;border-radius:50%;cursor:pointer;font-size:12px;}
.form-botones{display:flex;gap:10px;margin-top:16px;}
.upload-status{font-size:13px;color:#888;margin-top:8px;min-height:16px;}

/* LISTA */
.lista-productos{display:flex;flex-direction:column;gap:10px;}
.item{background:#151515;border:1px solid #2a2a2a;border-radius:12px;padding:12px;display:flex;gap:12px;align-items:center;}
.item img{width:60px;height:60px;object-fit:cover;border-radius:8px;background:#222;flex-shrink:0;}
.item-info{flex:1;min-width:0;}
.item-nombre{font-weight:bold;font-size:14px;}
.item-detalle{color:#888;font-size:12px;margin-top:2px;}
.item-precio{color:#e60012;font-weight:bold;font-size:14px;margin-top:2px;}
.item-botones{display:flex;gap:6px;flex-shrink:0;}
.item-botones button{background:#1a1a1a;border:1px solid #2a2a2a;color:white;padding:8px 10px;border-radius:8px;font-size:12px;cursor:pointer;}
.item-botones button:hover{border-color:#e60012;}
.item-botones .btn-eliminar:hover{border-color:#ff6b6b;color:#ff6b6b;}
.cargando{text-align:center;color:#888;padding:40px;}
.vacio{text-align:center;color:#555;padding:40px;}
.mensaje{padding:12px;border-radius:10px;text-align:center;font-weight:bold;margin-bottom:16px;display:none;}
.mensaje.ok{display:block;background:#16261c;color:#3ddc84;border:1px solid #3ddc84;}
.mensaje.error{display:block;background:#2a1010;color:#ff6b6b;border:1px solid #ff6b6b;}
</style>
</head>
<body>

<header>
<h1>MAIKOL <span>JORDAN</span> — Panel de Administración</h1>
</header>

<div class="login-screen" id="loginScreen">
<div class="login-box">
<h2>🔒 Iniciar sesión</h2>
<div class="password-wrapper">
<input type="password" id="passwordInput" placeholder="Contraseña" autocomplete="off">
<button type="button" class="toggle-eye" onclick="mostrarOcultarPassword()" id="toggleEyeBtn">👁️</button>
</div>
<button class="btn-entrar" onclick="iniciarSesion()">Entrar</button>
<div class="login-error" id="loginError"></div>
</div>
</div>

<div class="panel" id="panel">
<div class="mensaje" id="mensaje"></div>

<div class="toolbar">
<button class="btn" onclick="abrirFormulario()">➕ Agregar producto</button>
<button class="btn btn-secundario" onclick="cargarProductos()">🔄 Actualizar lista</button>
</div>

<div class="form-box" id="formBox">
<h3 id="formTitulo">Agregar producto</h3>
<div class="form-row">
<div>
<label>Nombre</label>
<input type="text" id="f-nombre" placeholder="Ej: Jordan Retro 4 Bred">
</div>
<div>
<label>Precio (CLP)</label>
<input type="number" id="f-precio" placeholder="Ej: 89990">
</div>
</div>
<div class="form-row">
<div>
<label>Categoría</label>
<input type="text" id="f-categoria" placeholder="Ej: Jordan Retro 4">
</div>
<div>
<label>Tallas (separadas por coma)</label>
<input type="text" id="f-tallas" placeholder="Ej: 38,39,40,41,42,43">
</div>
</div>
<div class="form-row">
<div>
<label>% Descuento (vacío = usa el general de la tienda)</label>
<input type="number" id="f-descuento" placeholder="Ej: 5" step="0.1">
</div>
<div>
<label>Visibilidad</label>
<select id="f-visible">
<option value="true">Visible en la tienda</option>
<option value="false">Oculto (sin stock, etc.)</option>
</select>
</div>
</div>

<label>Imágenes</label>
<div class="imagenes-zona" id="zonaImagenes" onclick="document.getElementById('fileInput').click()">
📸 Toca para elegir imágenes (puedes elegir varias)
</div>
<input type="file" id="fileInput" accept="image/*" multiple style="display:none;">
<div class="imagenes-preview" id="imagenesPreview"></div>
<div class="upload-status" id="uploadStatus"></div>

<div class="form-botones">
<button class="btn" onclick="guardarProducto()">💾 Guardar</button>
<button class="btn btn-secundario" onclick="cerrarFormulario()">Cancelar</button>
</div>
</div>

<div class="filtro-categoria-box">
<label>Buscar por nombre</label>
<input type="text" id="buscarNombre" placeholder="Ej: Retro 4" oninput="renderLista()">
</div>

<div class="filtro-categoria-box">
<label>Filtrar por categoría</label>
<select id="filtroCategoria" onchange="renderLista()">
<option value="todas">Todas las categorías</option>
</select>
</div>

<div class="form-box activo" id="masivoBox">
<h3>⚡ Acciones masivas por categoría</h3>
<div class="form-row">
<div>
<label>Categoría</label>
<select id="m-categoria"></select>
</div>
<div>
<label>Porcentaje (ej: 5 o -10)</label>
<input type="number" id="m-porcentaje" placeholder="Ej: 5" step="0.1">
</div>
</div>
<div class="form-botones">
<button class="btn" onclick="aplicarDescuentoMasivo()">🏷️ Aplicar descuento</button>
<button class="btn btn-secundario" onclick="ajustarPrecioMasivo()">💰 Ajustar precio base</button>
</div>
<div class="upload-status" id="masivoStatus"></div>
</div>

<div class="lista-productos" id="listaProductos">
<div class="cargando">Cargando productos...</div>
</div>
</div>

<script>
// ============================================================
//  CONFIGURACIÓN — PEGA AQUÍ TUS DATOS
// ============================================================
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyAtoDbzuZHm_51vRkP11afMjuoOb6B8HecCgHmLzZBgEQSIYurUnQsUC0g4QmPmj9K4g/exec";
const CLOUDINARY_CLOUD_NAME = "i1cyngly";
const CLOUDINARY_UPLOAD_PRESET = "maikoljordan_admin";
const ADMIN_PASSWORD = "xdlol"; // debe ser IGUAL a la del Apps Script

// ============================================================
let productos = [];
let imagenesActuales = []; // URLs ya subidas a Cloudinary para el producto en edición
let filaEnEdicion = null; // null = agregando nuevo, número = editando fila existente
let claveSesion = null;

function iniciarSesion() {
  const val = document.getElementById("passwordInput").value;
  if (val !== ADMIN_PASSWORD) {
    document.getElementById("loginError").textContent = "❌ Contraseña incorrecta";
    return;
  }
  claveSesion = val;
  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("panel").classList.add("activo");
  cargarProductos();
}

async function cargarProductos() {
  const lista = document.getElementById("listaProductos");
  lista.innerHTML = '<div class="cargando">Cargando productos...</div>';
  try {
    const res = await fetch(APPS_SCRIPT_URL);
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || "Error desconocido");
    productos = data.productos;
    renderOpcionesCategoria();
    renderLista();
  } catch (e) {
    lista.innerHTML = `<div class="vacio">❌ Error de conexión: ${e.message || e}</div>`;
  }
}

function renderOpcionesCategoria() {
  const select = document.getElementById("filtroCategoria");
  const valorActual = select.value || "todas";
  const categorias = [...new Set(productos.map(p => p.categoria).filter(Boolean))].sort();
  select.innerHTML = '<option value="todas">Todas las categorías</option>' +
    categorias.map(c => `<option value="${c}">${c}</option>`).join("");
  if (categorias.includes(valorActual)) select.value = valorActual;

  const selectMasivo = document.getElementById("m-categoria");
  const valorMasivoActual = selectMasivo.value;
  selectMasivo.innerHTML = categorias.map(c => `<option value="${c}">${c}</option>`).join("");
  if (categorias.includes(valorMasivoActual)) selectMasivo.value = valorMasivoActual;
}

function renderLista() {
  const lista = document.getElementById("listaProductos");
  const filtroCategoria = document.getElementById("filtroCategoria").value;
  const busqueda = document.getElementById("buscarNombre").value.trim().toLowerCase();
  let productosFiltrados = filtroCategoria === "todas" ? productos : productos.filter(p => p.categoria === filtroCategoria);
  if (busqueda) {
    productosFiltrados = productosFiltrados.filter(p => (p.nombre || "").toLowerCase().includes(busqueda));
  }
  if (productosFiltrados.length === 0) {
    lista.innerHTML = '<div class="vacio">No hay productos que coincidan.</div>';
    return;
  }
  lista.innerHTML = productosFiltrados.map(p => {
    const primeraImg = (p.imagenes || "").split(";")[0] || "";
    const oculto = p.visible === false;
    const tieneDescuento = p.descuento !== "" && p.descuento !== null && p.descuento !== undefined && !isNaN(p.descuento) && Number(p.descuento) > 0;
    const badges = (oculto ? '<span style="color:#ff6b6b;">🚫 Oculto</span> ' : '') + (tieneDescuento ? `<span style="color:#3ddc84;">🏷️ -${p.descuento}%</span>` : '');
    return `<div class="item" style="${oculto ? 'opacity:0.5;' : ''}">
      <img src="${primeraImg}" onerror="this.style.opacity=0">
      <div class="item-info">
        <div class="item-nombre">${p.nombre}</div>
        <div class="item-detalle">${p.categoria || "Sin categoría"} · Tallas: ${p.tallas || "-"}</div>
        <div class="item-precio">$${Number(p.precio).toLocaleString("es-CL")}</div>
        ${badges ? `<div style="font-size:11px;margin-top:2px;">${badges}</div>` : ''}
      </div>
      <div class="item-botones">
        <button onclick="editarProducto(${p.fila})">✏️</button>
        <button onclick="toggleVisibilidad(${p.fila}, ${!oculto})">${oculto ? '👁️' : '🚫'}</button>
        <button class="btn-eliminar" onclick="eliminarProducto(${p.fila}, '${(p.nombre||'').replace(/'/g,"")}')">🗑️</button>
      </div>
    </div>`;
  }).join("");
}

async function toggleVisibilidad(fila, ocultar) {
  try {
    const res = await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify({ accion: "cambiarVisibilidad", fila, visible: !ocultar, password: claveSesion })
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error);
    cargarProductos();
  } catch (e) {
    mostrarMensaje("❌ Error: " + e.message, "error");
  }
}

async function aplicarDescuentoMasivo() {
  const categoria = document.getElementById("m-categoria").value;
  const porcentaje = document.getElementById("m-porcentaje").value;
  if (!categoria || porcentaje === "") { mostrarMensajeMasivo("Elige categoría y porcentaje", "error"); return; }
  if (!confirm(`¿Aplicar ${porcentaje}% de descuento a TODOS los productos de "${categoria}"?`)) return;
  await ejecutarAccionMasiva("descuentoMasivo", categoria, porcentaje);
}

async function ajustarPrecioMasivo() {
  const categoria = document.getElementById("m-categoria").value;
  const porcentaje = document.getElementById("m-porcentaje").value;
  if (!categoria || porcentaje === "") { mostrarMensajeMasivo("Elige categoría y porcentaje", "error"); return; }
  if (!confirm(`⚠️ Esto cambia el PRECIO BASE (permanente) de todos los productos de "${categoria}" en ${porcentaje}%. ¿Continuar?`)) return;
  await ejecutarAccionMasiva("ajustarPrecioMasivo", categoria, porcentaje);
}

async function ejecutarAccionMasiva(accion, categoria, porcentaje) {
  try {
    const res = await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify({ accion, categoria, porcentaje: Number(porcentaje), password: claveSesion })
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error);
    mostrarMensajeMasivo("✅ Aplicado con éxito", "ok");
    cargarProductos();
  } catch (e) {
    mostrarMensajeMasivo("❌ Error: " + e.message, "error");
  }
}

function mostrarMensajeMasivo(texto, tipo) {
  const el = document.getElementById("masivoStatus");
  el.textContent = texto;
  el.style.color = tipo === "ok" ? "#3ddc84" : "#ff6b6b";
  setTimeout(() => { el.textContent = ""; }, 4000);
}

function abrirFormulario() {
  filaEnEdicion = null;
  imagenesActuales = [];
  document.getElementById("formTitulo").textContent = "Agregar producto";
  document.getElementById("f-nombre").value = "";
  document.getElementById("f-precio").value = "";
  document.getElementById("f-categoria").value = "";
  document.getElementById("f-tallas").value = "";
  document.getElementById("f-descuento").value = "";
  document.getElementById("f-visible").value = "true";
  renderImagenesPreview();
  document.getElementById("formBox").classList.add("activo");
  document.getElementById("formBox").scrollIntoView({ behavior: "smooth" });
}

function cerrarFormulario() {
  document.getElementById("formBox").classList.remove("activo");
}

function editarProducto(fila) {
  const p = productos.find(x => x.fila === fila);
  if (!p) return;
  filaEnEdicion = fila;
  imagenesActuales = (p.imagenes || "").split(";").map(s => s.trim()).filter(Boolean);
  document.getElementById("formTitulo").textContent = "Editar producto";
  document.getElementById("f-nombre").value = p.nombre || "";
  document.getElementById("f-precio").value = p.precio || "";
  document.getElementById("f-categoria").value = p.categoria || "";
  document.getElementById("f-tallas").value = (p.tallas || "").toString().split(";").join(",");
  document.getElementById("f-descuento").value = (p.descuento !== null && p.descuento !== undefined && p.descuento !== "") ? p.descuento : "";
  document.getElementById("f-visible").value = p.visible === false ? "false" : "true";
  renderImagenesPreview();
  document.getElementById("formBox").classList.add("activo");
  document.getElementById("formBox").scrollIntoView({ behavior: "smooth" });
}

async function eliminarProducto(fila, nombre) {
  if (!confirm(`¿Eliminar "${nombre}"? Esta acción no se puede deshacer.`)) return;
  try {
    const res = await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify({ accion: "eliminar", fila, password: claveSesion })
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error);
    mostrarMensaje("✅ Producto eliminado", "ok");
    cargarProductos();
  } catch (e) {
    mostrarMensaje("❌ Error al eliminar: " + e.message, "error");
  }
}

// ============================================================
//  IMÁGENES (Cloudinary — unsigned upload, sin backend)
// ============================================================
document.getElementById("fileInput").addEventListener("change", async function() {
  const files = Array.from(this.files);
  if (files.length === 0) return;
  const status = document.getElementById("uploadStatus");
  for (let i = 0; i < files.length; i++) {
    status.textContent = `Subiendo imagen ${i + 1} de ${files.length}...`;
    try {
      const url = await subirImagenCloudinary(files[i]);
      imagenesActuales.push(url);
      renderImagenesPreview();
    } catch (e) {
      status.textContent = "❌ Error al subir una imagen. Revisa tu cloud name / preset.";
      return;
    }
  }
  status.textContent = "✅ Imágenes subidas";
  this.value = "";
});

async function subirImagenCloudinary(file) {
  const formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", CLOUDINARY_UPLOAD_PRESET);
  const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`, {
    method: "POST",
    body: formData
  });
  const data = await res.json();
  if (!data.secure_url) throw new Error("Sin URL de respuesta");
  return data.secure_url;
}

function renderImagenesPreview() {
  const cont = document.getElementById("imagenesPreview");
  cont.innerHTML = imagenesActuales.map((url, i) => `
    <div class="img-mini">
      <img src="${url}">
      <button onclick="quitarImagen(${i})">✕</button>
    </div>
  `).join("");
}

function quitarImagen(i) {
  imagenesActuales.splice(i, 1);
  renderImagenesPreview();
}

// ============================================================
//  GUARDAR (agregar o editar)
// ============================================================
async function guardarProducto() {
  const nombre = document.getElementById("f-nombre").value.trim();
  const precio = document.getElementById("f-precio").value.trim();
  const categoria = document.getElementById("f-categoria").value.trim();
  const tallasInput = document.getElementById("f-tallas").value.trim();
  const descuento = document.getElementById("f-descuento").value.trim();
  const visible = document.getElementById("f-visible").value === "true";

  if (!nombre || !precio) {
    mostrarMensaje("❌ Completa al menos nombre y precio", "error");
    return;
  }
  if (imagenesActuales.length === 0) {
    if (!confirm("No agregaste imágenes. ¿Guardar de todas formas?")) return;
  }

  const tallas = tallasInput.split(",").map(t => t.trim()).filter(Boolean).join(";");
  const imagenes = imagenesActuales.join(";");
  const accion = filaEnEdicion ? "editar" : "agregar";

  try {
    const res = await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify({
        accion, fila: filaEnEdicion, nombre, precio, categoria, tallas, imagenes, descuento, visible,
        password: claveSesion
      })
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error);
    mostrarMensaje("✅ Producto guardado", "ok");
    cerrarFormulario();
    cargarProductos();
  } catch (e) {
    mostrarMensaje("❌ Error al guardar: " + e.message, "error");
  }
}

function mostrarMensaje(texto, tipo) {
  const el = document.getElementById("mensaje");
  el.textContent = texto;
  el.className = "mensaje " + tipo;
  window.scrollTo({ top: 0, behavior: "smooth" });
  setTimeout(() => { el.className = "mensaje"; }, 4000);
}
</script>
</body>
</html>
