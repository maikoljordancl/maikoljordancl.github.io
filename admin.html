<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Maikol Jordan</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;}
body{background:radial-gradient(circle at 50% 0%, #171010 0%, #0b0b0b 45%);color:white;min-height:100vh;}
header{position:sticky;top:0;z-index:50;background:linear-gradient(180deg,#000 0%,#0a0a0a 100%);padding:18px 20px;text-align:center;border-bottom:2px solid #e60012;box-shadow:0 4px 20px rgba(0,0,0,0.6);}
header h1{font-size:19px;letter-spacing:0.3px;}
header span{color:#e60012;}

/* LOGIN */
.login-screen{display:flex;align-items:center;justify-content:center;min-height:80vh;padding:20px;}
.login-box{background:linear-gradient(160deg,#181818,#121212);border:1px solid #2a2a2a;border-radius:20px;padding:34px 28px;max-width:340px;width:100%;box-shadow:0 20px 50px rgba(0,0,0,0.6);}
.login-box h2{margin-bottom:22px;text-align:center;font-size:19px;}
.password-wrapper{position:relative;margin-bottom:16px;}
.password-wrapper input{width:100%;padding:13px 42px 13px 14px;background:#1c1c1c;border:1px solid #2a2a2a;border-radius:12px;color:white;font-size:15px;outline:none;transition:0.2s;}
.password-wrapper input:focus{border-color:#e60012;box-shadow:0 0 0 3px rgba(230,0,18,0.15);}
.toggle-eye{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:#888;font-size:18px;cursor:pointer;padding:6px;}
.login-box button.btn-entrar{width:100%;padding:13px;background:#e60012;border:none;border-radius:12px;color:white;font-weight:bold;cursor:pointer;box-shadow:0 6px 16px rgba(230,0,18,0.3);transition:0.2s;}
.login-box button.btn-entrar:active{transform:scale(0.98);}
.login-box button.btn-entrar:hover{background:#c8000f;}
.login-error{color:#ff6b6b;font-size:13px;text-align:center;margin-top:12px;min-height:16px;}

/* PANEL */
.panel{display:none;padding:20px;max-width:900px;margin:0 auto;}
.panel.activo{display:block;}
.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px;}
.btn{background:#e60012;border:none;padding:13px 18px;border-radius:12px;color:white;font-weight:bold;cursor:pointer;transition:0.15s;box-shadow:0 4px 14px rgba(230,0,18,0.25);}
.btn:hover{background:#c8000f;}
.btn:active{transform:scale(0.97);}
.btn-secundario{background:#171717;border:1px solid #2a2a2a;box-shadow:none;}
.btn-secundario:hover{border-color:#e60012;background:#1c1414;}
.filtro-categoria-box{margin-bottom:14px;}
.filtro-categoria-box label{font-size:12px;color:#999;display:block;margin-bottom:5px;font-weight:600;letter-spacing:0.2px;}
.filtro-categoria-box input,.filtro-categoria-box select{width:100%;padding:12px;background:#161616;border:1px solid #2a2a2a;border-radius:10px;color:white;font-size:14px;outline:none;transition:0.2s;}
.filtro-categoria-box input:focus,.filtro-categoria-box select:focus{border-color:#e60012;box-shadow:0 0 0 3px rgba(230,0,18,0.12);}

/* FORM */
.form-box{background:linear-gradient(160deg,#171717,#121212);border:1px solid #2a2a2a;border-radius:18px;padding:22px;margin-bottom:22px;display:none;box-shadow:0 10px 30px rgba(0,0,0,0.35);}
.form-box.activo{display:block;}
.form-box h3{margin-bottom:18px;font-size:16px;display:flex;align-items:center;gap:8px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
.form-row.single{grid-template-columns:1fr;}
.form-box input, .form-box select{width:100%;padding:12px;background:#181818;border:1px solid #2a2a2a;border-radius:10px;color:white;font-size:14px;outline:none;transition:0.2s;}
.form-box input:focus, .form-box select:focus{border-color:#e60012;box-shadow:0 0 0 3px rgba(230,0,18,0.12);}
.form-box label{font-size:12px;color:#999;display:block;margin-bottom:5px;font-weight:600;letter-spacing:0.2px;}
.imagenes-zona{border:2px dashed #3a3a3a;border-radius:14px;padding:20px;text-align:center;margin-bottom:12px;cursor:pointer;transition:0.2s;color:#bbb;font-size:14px;}
.imagenes-zona:hover{border-color:#e60012;color:white;background:rgba(230,0,18,0.05);}
.ia-imagen-box{background:rgba(230,0,18,0.06);border:1px solid rgba(230,0,18,0.25);border-radius:12px;padding:12px;margin-bottom:12px;}
.ia-imagen-box label{color:#ff8a8a;}
.ia-imagen-box input[type="text"]{flex:1;}
.imagenes-preview{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;}
.img-mini{position:relative;width:72px;height:72px;border-radius:10px;overflow:hidden;background:#222;box-shadow:0 4px 10px rgba(0,0,0,0.4);}
.img-mini img{width:100%;height:100%;object-fit:cover;}
.img-mini button{position:absolute;top:3px;right:3px;background:rgba(0,0,0,0.85);color:#ff6b6b;border:none;width:20px;height:20px;border-radius:50%;cursor:pointer;font-size:12px;}
.form-botones{display:flex;gap:10px;margin-top:18px;}
.upload-status{font-size:13px;color:#999;margin-top:10px;min-height:16px;}

/* LISTA */
.lista-productos{display:flex;flex-direction:column;gap:12px;}
.item{background:linear-gradient(160deg,#161616,#111);border:1px solid #262626;border-radius:14px;padding:13px;display:flex;gap:13px;align-items:center;transition:0.2s;box-shadow:0 4px 14px rgba(0,0,0,0.3);}
.item:active{transform:scale(0.995);}
.item img{width:62px;height:62px;object-fit:cover;border-radius:10px;background:#222;flex-shrink:0;box-shadow:0 3px 8px rgba(0,0,0,0.4);}
.item-info{flex:1;min-width:0;}
.item-nombre{font-weight:bold;font-size:14.5px;}
.item-detalle{color:#999;font-size:12px;margin-top:4px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.chip-categoria{background:rgba(230,0,18,0.12);color:#ff5c66;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;}
.item-precio{color:#e60012;font-weight:bold;font-size:14.5px;margin-top:4px;}
.precio-tachado{color:#777;font-weight:normal;text-decoration:line-through;font-size:12px;margin-right:6px;}
.item-botones{display:flex;flex-direction:column;gap:6px;flex-shrink:0;}
.item-botones button{background:#1c1c1c;border:1px solid #2a2a2a;color:white;padding:8px 10px;border-radius:9px;font-size:13px;cursor:pointer;transition:0.15s;}
.item-botones button:hover{border-color:#e60012;}
.item-botones .btn-eliminar:hover{border-color:#ff6b6b;color:#ff6b6b;}
.cargando{text-align:center;color:#888;padding:50px 20px;}
.vacio{text-align:center;color:#666;padding:50px 20px;}
.mensaje{padding:13px;border-radius:12px;text-align:center;font-weight:bold;margin-bottom:18px;display:none;}
.mensaje.ok{display:block;background:#122a1c;color:#3ddc84;border:1px solid #245c3a;}
.mensaje.error{display:block;background:#2a1414;color:#ff6b6b;border:1px solid #5c2424;}
.stats-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px;}
.stat-card{flex:1;min-width:110px;background:linear-gradient(160deg,#171717,#121212);border:1px solid #262626;border-radius:12px;padding:12px;text-align:center;}
.stat-card .valor{font-size:18px;font-weight:bold;color:#e60012;}
.stat-card .etiqueta{font-size:11px;color:#999;margin-top:2px;}
.marca-grupo{background:#161616;border:1px solid #262626;border-radius:12px;padding:12px;margin-bottom:10px;}
.marca-grupo-titulo{font-weight:bold;font-size:14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;}
.marca-grupo-titulo button{background:none;border:none;color:#ff6b6b;font-size:13px;cursor:pointer;}
.chip-sub{display:inline-flex;align-items:center;gap:5px;background:rgba(230,0,18,0.1);color:#ff8a8a;padding:4px 9px;border-radius:20px;font-size:12px;margin:3px 4px 0 0;}
.chip-sub button{background:none;border:none;color:#ff8a8a;cursor:pointer;font-size:12px;padding:0;line-height:1;}
</style>
</head>
<body>

<header>
<h1>MAIKOL <span>JORDAN</span> · Administración</h1>
</header>

<div class="login-screen" id="loginScreen">
<div class="login-box">
<h2>🔒 Iniciar sesión</h2>
<div class="password-wrapper">
<input type="password" id="passwordInput" placeholder="Contraseña" autocomplete="off">
<button type="button" class="toggle-eye" onclick="mostrarOcultarPassword()" id="toggleEyeBtn">👁️</button>
</div>
<button class="btn-entrar" onclick="iniciarSesion()">Entrar</button>
<div class="login-error" id="loginError"></div>
</div>
</div>

<div class="panel" id="panel">
<div class="mensaje" id="mensaje"></div>

<div class="stats-bar" id="statsBar"></div>

<div class="toolbar">
<button class="btn" onclick="abrirFormulario()">➕ Agregar producto</button>
<button class="btn btn-secundario" onclick="cargarProductos()">🔄 Actualizar lista</button>
<button class="btn btn-secundario" onclick="toggleCategoriasBox()">🗂️ Categorías</button>
<button class="btn btn-secundario" onclick="exportarCSV()">⬇️ Exportar CSV</button>
</div>

<div class="form-box" id="categoriasBox">
<h3>🗂️ Gestor de categorías</h3>
<div class="form-row">
<div>
<label>Nueva marca (ej: Jordan, Nike, New Balance)</label>
<input type="text" id="cat-nueva-marca" placeholder="Ej: Jordan">
</div>
<div style="display:flex;align-items:flex-end;">
<button class="btn btn-secundario" style="width:100%;" onclick="agregarMarca()">➕ Agregar marca</button>
</div>
</div>
<div class="form-row">
<div>
<label>Marca</label>
<select id="cat-marca-select" onchange="renderListaCategorias()"></select>
</div>
<div>
<label>Nueva categoría dentro de esa marca</label>
<input type="text" id="cat-nueva-categoria" placeholder="Ej: Retro 1">
</div>
</div>
<button class="btn btn-secundario" style="width:100%;margin-bottom:14px;" onclick="agregarCategoriaHija()">➕ Agregar categoría</button>
<div id="listaCategoriasBox"></div>
<div class="upload-status" id="categoriasStatus"></div>
</div>

<div class="form-box" id="formBox">
<h3 id="formTitulo">Agregar producto</h3>
<div class="form-row">
<div>
<label>Nombre</label>
<input type="text" id="f-nombre" placeholder="Ej: Jordan Retro 4 Bred">
</div>
<div>
<label>Precio (CLP)</label>
<input type="number" id="f-precio" placeholder="Ej: 89990">
</div>
</div>
<div class="form-row">
<div>
<label>Marca</label>
<select id="f-marca" onchange="renderSubcategoriasForm()">
<option value="">Sin marca</option>
</select>
</div>
<div>
<label>Categoría dentro de la marca</label>
<select id="f-subcategoria">
<option value="">Sin categoría</option>
</select>
</div>
</div>
<div class="form-row single">
<div>
<label><input type="checkbox" id="f-categoria-manual-check" onchange="toggleCategoriaManual()" style="width:auto;margin-right:6px;">Escribir categoría manual (para casos que no calzan arriba)</label>
<input type="text" id="f-categoria" placeholder="Ej: Jordan Retro 4" style="display:none;">
</div>
</div>
<div class="form-row">
<div>
<label>Tallas (separadas por coma)</label>
<input type="text" id="f-tallas" placeholder="Ej: 38,39,40,41,42,43">
</div>
</div>
<div class="form-row">
<div>
<label>% Descuento (vacío = usa el general de la tienda)</label>
<input type="number" id="f-descuento" placeholder="Ej: 5" step="0.1">
</div>
<div>
<label>Visibilidad</label>
<select id="f-visible">
<option value="true">Visible en la tienda</option>
<option value="false">Oculto (sin stock, etc.)</option>
</select>
</div>
</div>

<label>Imágenes</label>

<div class="ia-imagen-box">
<label style="margin-bottom:6px;">🤖 Generar fotos con IA (sube una foto real de la zapatilla)</label>
<div class="imagenes-zona" id="zonaRefIA" style="padding:12px;margin-bottom:8px;" onclick="document.getElementById('fileInputRefIA').click()">
<span id="refIAtexto">📷 Toca para subir una foto de referencia de esta zapatilla</span>
</div>
<input type="file" id="fileInputRefIA" accept="image/*" style="display:none;" onchange="cargarImagenReferencia(event)">
<div style="display:flex;gap:8px;">
<button type="button" class="btn btn-secundario" style="flex:1;" onclick="generarPortadaIA()">🖼️ Generar portada</button>
<button type="button" class="btn btn-secundario" style="flex:1;" onclick="generarProductoIA()">📸 Generar 4 fotos</button>
</div>
<div class="upload-status" id="iaStatus"></div>
</div>

<div class="imagenes-zona" id="zonaImagenes" onclick="document.getElementById('fileInput').click()">
📸 Toca para elegir imágenes (puedes elegir varias)
</div>
<input type="file" id="fileInput" accept="image/*" multiple style="display:none;">
<div class="imagenes-preview" id="imagenesPreview"></div>
<div class="upload-status" id="uploadStatus"></div>

<div class="form-botones">
<button class="btn" onclick="guardarProducto()">💾 Guardar</button>
<button class="btn btn-secundario" onclick="cerrarFormulario()">Cancelar</button>
</div>
</div>

<div class="filtro-categoria-box">
<label>Buscar por nombre</label>
<input type="text" id="buscarNombre" placeholder="Ej: Retro 4" oninput="renderLista()">
</div>

<div class="filtro-categoria-box">
<label>Filtrar por categoría</label>
<select id="filtroCategoria" onchange="renderLista()">
<option value="todas">Todas las categorías</option>
</select>
</div>

<div class="form-box activo" id="masivoBox">
<h3>⚡ Acciones masivas por categoría</h3>
<div class="form-row">
<div>
<label>Categoría</label>
<select id="m-categoria"></select>
</div>
<div>
<label>Porcentaje (ej: 5 o -10)</label>
<input type="number" id="m-porcentaje" placeholder="Ej: 5" step="0.1">
</div>
</div>
<div class="form-botones">
<button class="btn" onclick="aplicarDescuentoMasivo()">🏷️ Aplicar descuento</button>
<button class="btn btn-secundario" onclick="ajustarPrecioMasivo()">💰 Ajustar precio base</button>
</div>
<div class="upload-status" id="masivoStatus"></div>
</div>

<div class="lista-productos" id="listaProductos">
<div class="cargando">Cargando productos...</div>
</div>
</div>

<script>
// ============================================================
//  CONFIGURACIÓN — PEGA AQUÍ TUS DATOS
// ============================================================
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyAtoDbzuZHm_51vRkP11afMjuoOb6B8HecCgHmLzZBgEQSIYurUnQsUC0g4QmPmj9K4g/exec";
const CLOUDINARY_CLOUD_NAME = "i1cyngly";
const CLOUDINARY_UPLOAD_PRESET = "maikoljordan_admin";
const ADMIN_PASSWORD = "xdlol"; // debe ser IGUAL a la del Apps Script
const DESCUENTO_GENERAL = 0.15; // debe coincidir con el de index.html
const PISO_PRECIO_DESCUENTO = 65990; // debe coincidir con el de index.html

function normalizarTexto(s) {
  return (s || "").toString().trim().toLowerCase().replace(/\s+/g, " ");
}
function esExcluidoDC(p) {
  return /(^|\s)dc(\s|$)/.test(normalizarTexto(p.nombre));
}
function precioConDescuentoPreview(p) {
  const precioBase = Number(p.precio) || 0;
  let pct;
  if (p.descuento !== null && p.descuento !== undefined && p.descuento !== "" && !isNaN(p.descuento)) {
    pct = Number(p.descuento) / 100;
  } else {
    pct = esExcluidoDC(p) ? 0 : DESCUENTO_GENERAL;
  }
  if (pct <= 0) return precioBase;
  const descontado = Math.round(precioBase * (1 - pct));
  if (descontado < PISO_PRECIO_DESCUENTO) {
    return precioBase > PISO_PRECIO_DESCUENTO ? PISO_PRECIO_DESCUENTO : precioBase;
  }
  return descontado;
}

// ============================================================
let productos = [];
let categoriasData = []; // [{marca, categoria}]
let imagenesActuales = []; // URLs ya subidas a Cloudinary para el producto en edición
let filaEnEdicion = null; // null = agregando nuevo, número = editando fila existente
let claveSesion = null;

function mostrarOcultarPassword() {
  const input = document.getElementById("passwordInput");
  const btn = document.getElementById("toggleEyeBtn");
  if (input.type === "password") {
    input.type = "text";
    btn.textContent = "🙈";
  } else {
    input.type = "password";
    btn.textContent = "👁️";
  }
}

function iniciarSesion() {
  const val = document.getElementById("passwordInput").value.trim();
  if (val !== ADMIN_PASSWORD.trim()) {
    document.getElementById("loginError").textContent = "❌ Contraseña incorrecta";
    return;
  }
  claveSesion = val;
  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("panel").classList.add("activo");
  cargarProductos();
}

async function cargarProductos() {
  const lista = document.getElementById("listaProductos");
  lista.innerHTML = '<div class="cargando">Cargando productos...</div>';
  try {
    const res = await fetch(APPS_SCRIPT_URL);
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || "Error desconocido");
    productos = data.productos;
    categoriasData = data.categorias || [];
    renderOpcionesCategoria();
    renderLista();
    renderEstadisticas();
    renderSelectMarcasCategorias();
    renderListaCategorias();
    renderMarcasForm();
  } catch (e) {
    lista.innerHTML = `<div class="vacio">❌ Error de conexión: ${e.message || e}</div>`;
  }
}

function renderOpcionesCategoria() {
  const select = document.getElementById("filtroCategoria");
  const valorActual = select.value || "todas";
  const categorias = [...new Set(productos.map(p => p.categoria).filter(Boolean))].sort();
  select.innerHTML = '<option value="todas">Todas las categorías</option>' +
    categorias.map(c => `<option value="${c}">${c}</option>`).join("");
  if (categorias.includes(valorActual)) select.value = valorActual;

  const selectMasivo = document.getElementById("m-categoria");
  const valorMasivoActual = selectMasivo.value;
  selectMasivo.innerHTML = categorias.map(c => `<option value="${c}">${c}</option>`).join("");
  if (categorias.includes(valorMasivoActual)) selectMasivo.value = valorMasivoActual;
}

// ============================================================
//  ESTADÍSTICAS RÁPIDAS
// ============================================================
function renderEstadisticas() {
  const total = productos.length;
  const valorInventario = productos.reduce((sum, p) => sum + (Number(p.precio) || 0), 0);
  const ocultos = productos.filter(p => p.visible === false).length;
  const sinImagenes = productos.filter(p => !p.imagenes || !p.imagenes.trim()).length;
  document.getElementById("statsBar").innerHTML = `
    <div class="stat-card"><div class="valor">${total}</div><div class="etiqueta">Productos</div></div>
    <div class="stat-card"><div class="valor">$${valorInventario.toLocaleString("es-CL")}</div><div class="etiqueta">Valor inventario</div></div>
    <div class="stat-card"><div class="valor">${ocultos}</div><div class="etiqueta">Ocultos</div></div>
    <div class="stat-card"><div class="valor">${sinImagenes}</div><div class="etiqueta">Sin imágenes</div></div>
  `;
}

// ============================================================
//  EXPORTAR CATÁLOGO A CSV
// ============================================================
function exportarCSV() {
  const encabezados = ["Nombre", "Precio", "Imagenes", "Categoria", "Tallas", "Descuento", "Visible"];
  const filas = productos.map(p => [
    p.nombre, p.precio, p.imagenes, p.categoria, p.tallas,
    p.descuento || "", p.visible === false ? "FALSE" : "TRUE"
  ]);
  const csv = [encabezados, ...filas]
    .map(fila => fila.map(v => `"${(v ?? "").toString().replace(/"/g, '""')}"`).join(","))
    .join("\n");
  const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `catalogo-maikoljordan-${new Date().toISOString().slice(0, 10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

// ============================================================
//  GESTOR DE CATEGORÍAS (marca → subcategorías)
// ============================================================
function toggleCategoriasBox() {
  document.getElementById("categoriasBox").classList.toggle("activo");
}

function marcasUnicas() {
  return [...new Set(categoriasData.map(c => c.marca))].sort();
}

function renderSelectMarcasCategorias() {
  const select = document.getElementById("cat-marca-select");
  const valorActual = select.value;
  const marcas = marcasUnicas();
  select.innerHTML = marcas.length
    ? marcas.map(m => `<option value="${m}">${m}</option>`).join("")
    : '<option value="">— agrega una marca primero —</option>';
  if (marcas.includes(valorActual)) select.value = valorActual;
}

async function agregarMarca() {
  const input = document.getElementById("cat-nueva-marca");
  const marca = input.value.trim();
  const status = document.getElementById("categoriasStatus");
  if (!marca) { status.textContent = "❌ Escribe un nombre de marca"; return; }
  status.textContent = "⏳ Agregando marca...";
  try {
    await llamarCategoriaAPI("agregarCategoria", { marca, categoria: "" });
    input.value = "";
    status.textContent = "✅ Marca agregada";
    await cargarProductos();
  } catch (e) {
    status.textContent = "❌ Error: " + e.message;
  }
}

async function agregarCategoriaHija() {
  const marca = document.getElementById("cat-marca-select").value;
  const input = document.getElementById("cat-nueva-categoria");
  const categoria = input.value.trim();
  const status = document.getElementById("categoriasStatus");
  if (!marca) { status.textContent = "❌ Primero agrega y elige una marca"; return; }
  if (!categoria) { status.textContent = "❌ Escribe el nombre de la categoría"; return; }
  status.textContent = "⏳ Agregando categoría...";
  try {
    await llamarCategoriaAPI("agregarCategoria", { marca, categoria });
    input.value = "";
    status.textContent = "✅ Categoría agregada";
    await cargarProductos();
  } catch (e) {
    status.textContent = "❌ Error: " + e.message;
  }
}

async function eliminarCategoria(marca, categoria) {
  const status = document.getElementById("categoriasStatus");
  const etiqueta = categoria ? `${marca} → ${categoria}` : `la marca "${marca}" completa (y todas sus categorías)`;
  if (!confirm(`¿Eliminar ${etiqueta}? Esto no borra los productos, solo la opción del listado.`)) return;
  status.textContent = "⏳ Eliminando...";
  try {
    if (!categoria) {
      // Eliminar la marca completa: borra la marca y todas sus categorías hijas
      const hijas = categoriasData.filter(c => c.marca === marca);
      for (const h of hijas) {
        await llamarCategoriaAPI("eliminarCategoria", { marca: h.marca, categoria: h.categoria });
      }
    } else {
      await llamarCategoriaAPI("eliminarCategoria", { marca, categoria });
    }
    status.textContent = "✅ Eliminado";
    await cargarProductos();
  } catch (e) {
    status.textContent = "❌ Error: " + e.message;
  }
}

async function llamarCategoriaAPI(accion, { marca, categoria }) {
  const res = await fetch(APPS_SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify({ accion, marca, categoria, password: claveSesion })
  });
  const data = await res.json();
  if (!data.ok) throw new Error(data.error || "Error desconocido");
}

function toggleCategoriaManual() {
  const check = document.getElementById("f-categoria-manual-check").checked;
  document.getElementById("f-categoria").style.display = check ? "block" : "none";
  document.getElementById("f-marca").parentElement.style.opacity = check ? "0.4" : "1";
  document.getElementById("f-subcategoria").parentElement.style.opacity = check ? "0.4" : "1";
}

function categoriaFinalDelForm() {
  const manualCheck = document.getElementById("f-categoria-manual-check").checked;
  if (manualCheck) return document.getElementById("f-categoria").value.trim();
  const marca = document.getElementById("f-marca").value;
  const sub = document.getElementById("f-subcategoria").value;
  if (marca && sub) return `${marca} - ${sub}`;
  return marca || sub || "";
}

// Intenta separar una categoría guardada tipo "Marca - Sub" en los selects; si no calza, usa el campo manual
function aplicarCategoriaAlForm(categoriaGuardada) {
  document.getElementById("f-categoria-manual-check").checked = false;
  document.getElementById("f-categoria").style.display = "none";
  document.getElementById("f-categoria").value = "";
  if (!categoriaGuardada) {
    document.getElementById("f-marca").value = "";
    renderSubcategoriasForm();
    return;
  }
  const partes = categoriaGuardada.split(" - ");
  const marcas = marcasUnicas();
  if (partes.length === 2 && marcas.includes(partes[0])) {
    document.getElementById("f-marca").value = partes[0];
    renderSubcategoriasForm();
    document.getElementById("f-subcategoria").value = partes[1];
  } else if (marcas.includes(categoriaGuardada)) {
    document.getElementById("f-marca").value = categoriaGuardada;
    renderSubcategoriasForm();
  } else {
    // No calza con ninguna marca conocida: usar campo manual para no perder el dato
    document.getElementById("f-categoria-manual-check").checked = true;
    document.getElementById("f-categoria").style.display = "block";
    document.getElementById("f-categoria").value = categoriaGuardada;
  }
}

function duplicarProducto(fila) {
  const p = productos.find(x => x.fila === fila);
  if (!p) return;
  filaEnEdicion = null; // se guardará como NUEVO producto
  imagenesActuales = (p.imagenes || "").split(";").map(s => s.trim()).filter(Boolean);
  document.getElementById("formTitulo").textContent = "Agregar producto (duplicado de \"" + p.nombre + "\")";
  document.getElementById("f-nombre").value = (p.nombre || "") + " (copia)";
  document.getElementById("f-precio").value = p.precio || "";
  aplicarCategoriaAlForm(p.categoria || "");
  document.getElementById("f-tallas").value = (p.tallas || "").toString().split(";").join(",");
  document.getElementById("f-descuento").value = (p.descuento !== null && p.descuento !== undefined && p.descuento !== "") ? p.descuento : "";
  document.getElementById("f-visible").value = "true";
  document.getElementById("iaStatus").textContent = "";
  imagenReferenciaIA = null;
  document.getElementById("refIAtexto").textContent = "📷 Toca para subir una foto de referencia de esta zapatilla";
  renderImagenesPreview();
  document.getElementById("formBox").classList.add("activo");
  document.getElementById("formBox").scrollIntoView({ behavior: "smooth" });
}

function renderLista() {
  const lista = document.getElementById("listaProductos");
  const filtroCategoria = document.getElementById("filtroCategoria").value;
  const busqueda = document.getElementById("buscarNombre").value.trim().toLowerCase();
  let productosFiltrados = filtroCategoria === "todas" ? productos : productos.filter(p => p.categoria === filtroCategoria);
  if (busqueda) {
    productosFiltrados = productosFiltrados.filter(p => (p.nombre || "").toLowerCase().includes(busqueda));
  }
  if (productosFiltrados.length === 0) {
    lista.innerHTML = '<div class="vacio">No hay productos que coincidan.</div>';
    return;
  }
  lista.innerHTML = productosFiltrados.map(p => {
    const primeraImg = (p.imagenes || "").split(";")[0] || "";
    const oculto = p.visible === false;
    const tieneDescuento = p.descuento !== "" && p.descuento !== null && p.descuento !== undefined && !isNaN(p.descuento) && Number(p.descuento) > 0;
    const badges = (oculto ? '<span style="color:#ff6b6b;">🚫 Oculto</span> ' : '') + (tieneDescuento ? `<span style="color:#3ddc84;">🏷️ -${p.descuento}%</span>` : '');
    const precioFinal = precioConDescuentoPreview(p);
    const hayRebaja = precioFinal < Number(p.precio);
    const precioHtml = hayRebaja
      ? `<div class="item-precio"><span class="precio-tachado">$${Number(p.precio).toLocaleString("es-CL")}</span> $${precioFinal.toLocaleString("es-CL")}</div>`
      : `<div class="item-precio">$${Number(p.precio).toLocaleString("es-CL")}</div>`;
    return `<div class="item" style="${oculto ? 'opacity:0.5;' : ''}">
      <img src="${primeraImg}" onerror="this.style.opacity=0">
      <div class="item-info">
        <div class="item-nombre">${p.nombre}</div>
        <div class="item-detalle"><span class="chip-categoria">${p.categoria || "Sin categoría"}</span> Tallas: ${p.tallas || "-"}</div>
        ${precioHtml}
        ${badges ? `<div style="font-size:11px;margin-top:2px;">${badges}</div>` : ''}
      </div>
      <div class="item-botones">
        <button onclick="editarProducto(${p.fila})">✏️</button>
        <button onclick="duplicarProducto(${p.fila})">📋</button>
        <button onclick="toggleVisibilidad(${p.fila}, ${!oculto})">${oculto ? '👁️' : '🚫'}</button>
        <button class="btn-eliminar" onclick="eliminarProducto(${p.fila}, '${(p.nombre||'').replace(/'/g,"")}')">🗑️</button>
      </div>
    </div>`;
  }).join("");
}

// ============================================================
//  IMÁGENES (Cloudinary — unsigned upload, sin backend)
// ============================================================
document.getElementById("fileInput").addEventListener("change", async function() {
  const files = Array.from(this.files);
  if (files.length === 0) return;
  const status = document.getElementById("uploadStatus");
  for (let i = 0; i < files.length; i++) {
    status.textContent = `Subiendo imagen ${i + 1} de ${files.length}...`;
    try {
      const url = await subirImagenCloudinary(files[i]);
      imagenesActuales.push(url);
      renderImagenesPreview();
    } catch (e) {
      status.textContent = "❌ Error al subir una imagen. Revisa tu cloud name / preset.";
      return;
    }
  }
  status.textContent = "✅ Imágenes subidas";
  this.value = "";
});

async function subirImagenCloudinary(file) {
  const formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", CLOUDINARY_UPLOAD_PRESET);
  const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`, {
    method: "POST",
    body: formData
  });
  const data = await res.json();
  if (!data.secure_url) throw new Error("Sin URL de respuesta");
  return data.secure_url;
}

// ============================================================
//  GENERACIÓN DE IMÁGENES CON IA (Qwen Image Edit, vía Hugging Face, gratis)
// ============================================================
let imagenReferenciaIA = null; // { base64, mimeType }

function cargarImagenReferencia(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    const base64 = reader.result.split(",")[1];
    imagenReferenciaIA = { base64, mimeType: file.type };
    document.getElementById("refIAtexto").textContent = "✅ Foto de referencia cargada: " + file.name;
  };
  reader.readAsDataURL(file);
}

function nombreModeloActual() {
  return document.getElementById("f-nombre").value.trim();
}

async function generarPortadaIA() {
  const status = document.getElementById("iaStatus");
  const nombreModelo = nombreModeloActual();
  if (!nombreModelo) { status.textContent = "❌ Escribe primero el nombre del modelo arriba"; return; }
  if (!imagenReferenciaIA) { status.textContent = "❌ Sube primero una foto de referencia de la zapatilla"; return; }

  status.textContent = "🎨 Generando portada, espera unos segundos...";
  try {
    const url = await llamarGenerarImagen({ modo: "portada", nombreModelo });
    imagenesActuales.push(url);
    renderImagenesPreview();
    status.textContent = "✅ Portada generada y agregada";
  } catch (e) {
    status.textContent = "❌ Error: " + e.message;
  }
}

async function generarProductoIA() {
  const status = document.getElementById("iaStatus");
  const nombreModelo = nombreModeloActual();
  if (!nombreModelo) { status.textContent = "❌ Escribe primero el nombre del modelo arriba"; return; }
  if (!imagenReferenciaIA) { status.textContent = "❌ Sube primero una foto de referencia de la zapatilla"; return; }

  for (let i = 0; i < 4; i++) {
    status.textContent = `🎨 Generando foto ${i + 1} de 4...`;
    try {
      const url = await llamarGenerarImagen({ modo: "producto", nombreModelo, anguloIndex: i });
      imagenesActuales.push(url);
      renderImagenesPreview();
    } catch (e) {
      status.textContent = `❌ Error en foto ${i + 1}: ` + e.message;
      return;
    }
  }
  status.textContent = "✅ 4 fotos generadas y agregadas";
}

async function llamarGenerarImagen({ modo, nombreModelo, anguloIndex }) {
  const res = await fetch("/api/generate-image", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      modo, nombreModelo, anguloIndex,
      imagenBase64: imagenReferenciaIA.base64,
      imagenMimeType: imagenReferenciaIA.mimeType,
      password: claveSesion
    })
  });
  const data = await res.json();
  if (!data.ok) throw new Error(data.error || "Error desconocido");
  const blob = base64ToBlob(data.base64, data.mimeType);
  return await subirImagenCloudinary(blob);
}

function base64ToBlob(base64, mimeType) {
  const byteChars = atob(base64);
  const byteNumbers = new Array(byteChars.length);
  for (let i = 0; i < byteChars.length; i++) byteNumbers[i] = byteChars.charCodeAt(i);
  const byteArray = new Uint8Array(byteNumbers);
  return new Blob([byteArray], { type: mimeType || "image/png" });
}

function renderImagenesPreview() {
  const cont = document.getElementById("imagenesPreview");
  cont.innerHTML = imagenesActuales.map((url, i) => `
    <div class="img-mini">
      <img src="${url}">
      <button onclick="quitarImagen(${i})">✕</button>
    </div>
  `).join("");
}

function quitarImagen(i) {
  imagenesActuales.splice(i, 1);
  renderImagenesPreview();
}

// ============================================================
//  GUARDAR (agregar o editar)
// ============================================================
async function guardarProducto() {
  const nombre = document.getElementById("f-nombre").value.trim();
  const precio = document.getElementById("f-precio").value.trim();
  const categoria = categoriaFinalDelForm();
  const tallasInput = document.getElementById("f-tallas").value.trim();
  const descuento = document.getElementById("f-descuento").value.trim();
  const visible = document.getElementById("f-visible").value === "true";

  if (!nombre || !precio) {
    mostrarMensaje("❌ Completa al menos nombre y precio", "error");
    return;
  }

  const yaExiste = productos.some(p => p.fila !== filaEnEdicion && normalizarTexto(p.nombre) === normalizarTexto(nombre));
  if (yaExiste) {
    if (!confirm(`⚠️ Ya existe un producto llamado "${nombre}". ¿Guardarlo de todas formas?`)) return;
  }
  if (imagenesActuales.length === 0) {
    if (!confirm("No agregaste imágenes. ¿Guardar de todas formas?")) return;
  }

  const tallas = tallasInput.split(",").map(t => t.trim()).filter(Boolean).join(";");
  const imagenes = imagenesActuales.join(";");
  const accion = filaEnEdicion ? "editar" : "agregar";

  try {
    const res = await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify({
        accion, fila: filaEnEdicion, nombre, precio, categoria, tallas, imagenes, descuento, visible,
        password: claveSesion
      })
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error);
    mostrarMensaje("✅ Producto guardado", "ok");
    cerrarFormulario();
    cargarProductos();
  } catch (e) {
    mostrarMensaje("❌ Error al guardar: " + e.message, "error");
  }
}

function mostrarMensaje(texto, tipo) {
  const el = document.getElementById("mensaje");
  el.textContent = texto;
  el.className = "mensaje " + tipo;
  window.scrollTo({ top: 0, behavior: "smooth" });
  setTimeout(() => { el.className = "mensaje"; }, 4000);
}
